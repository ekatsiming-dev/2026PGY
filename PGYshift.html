<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGY 規則班抽籤系統</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas for Image Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#a94438',    /* 質感磚紅 */
                            navy: '#3a4a61',   /* 深海軍藍 */
                            cream: '#f4f1ea',  /* 暖調白 */
                            dark: '#0f0f0f'    /* 深邃黑 */
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #f4f1ea; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; border: 2px solid #f4f1ea; }
        ::-webkit-scrollbar-thumb:hover { background: #a94438; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .scale-in { animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="text-brand-dark">
    <div id="root"></div>

    <script type="text/babel">
        // --- 班表資料模型 ---
        const pgy1Schedule = {
            "PGY1-G01": ["選","選","外","外","社","社","婦","兒","急","內","內","內"],
            "PGY1-G02": ["急","婦","兒","選","外","外","社","社","選","內","內","內"],
            "PGY1-G03": ["選","急","婦","選","外","外","社","社","兒","內","內","內"],
            "PGY1-G04": ["內","內","內","婦","兒","急","選","選","社","社","外","外"],
            "PGY1-G05": ["內","內","內","急","婦","兒","選","選","社","社","外","外"],
            "PGY1-G06": ["內","內","內","兒","急","婦","外","外","選","選","社","社"],
            "PGY1-G07": ["選","兒","急","內","內","內","外","外","婦","選","社","社"],
            "PGY1-G08": ["兒","選","選","內","內","內","急","婦","外","外","社","社"],
            "PGY1-G09": ["婦","選","選","內","內","內","兒","急","外","外","社","社"],
            "PGY1-G10": ["外","外","社","社","選","選","內","內","內","婦","兒","急"],
            "PGY1-G11": ["外","外","社","社","選","選","內","內","內","急","婦","兒"],
            "PGY1-G12": ["選","選","外","外","社","社","內","內","內","兒","急","婦"]
        };

        const pgy2Schedule = {
            "PGY2-G01": ["選#","選#","外#","外#","選","選","老醫","選","急","內#","內#","內#"],
            "PGY2-G02": ["急","老醫","選","選","外#","外#","選#","選#","選","內#","內#","內#"],
            "PGY2-G03": ["選","急","老醫","選","外#","外#","選#","選#","選","內#","內#","內#"],
            "PGY2-G04": ["內#","內#","內#","老醫","選","急","選","選","選#","選#","外#","外#"],
            "PGY2-G05": ["外#","外#","選#","急","老醫","選#","內#","內#","內#","選","選","選"],
            "PGY2-G06": ["內#","內#","內#","選#","急","老醫","外#","外#","選#","選","選","選"],
            "PGY2-G07": ["選","選","急","內#","內#","內#","選#","選","老醫","選#","外#","外#"],
            "PGY2-G08": ["選","選","選","內#","內#","內#","急","老醫","外#","外#","選#","選#"],
            "PGY2-G09": ["老醫","選","選","內#","內#","內#","選","急","外#","外#","選#","選#"],
            "PGY2-G10": ["外#","外#","選#","選#","選","選","內#","內#","內#","老醫","選","急"],
            "PGY2-G11": ["內#","內#","內#","選","選#","選#","外#","外#","選","急","老醫","選"],
            "PGY2-G12": ["選#","選#","外#","外#","選","選","內#","內#","內#","選","急","老醫"]
        };

        // --- 預設測試名單 ---
        const MOCK_PGY1_NAMES = "陳冠宇, 林佳樺, 張子軒, 李冠廷, 王詩婷, 吳宗翰, 劉奕辰, 蔡承恩, 楊雅涵, 許明哲, 鄭宇涵, 謝柏凱, 郭俊傑, 邱柏翰, 曾品睿, 黃柏宇, 林宜蓁, 洪佳慧, 游家瑋, 彭子萱, 潘柏丞, 葉承翰, 蔡孟哲, 莊詠晴, 蘇俊宏, 簡柏宇, 蕭家維, 呂品萱, 羅翊綺, 施博文, 柯詠晴, 詹子晴, 連建銘, 白宇軒, 卓佳霖, 馮宇翔";
        const MOCK_PGY2_NAMES = "趙宇軒, 錢盈盈, 孫冠霖, 李佳穎, 吳柏毅, 鄭文傑, 王思婷, 馮子維, 陳品涵, 褚明哲, 衛斯理, 蔣欣宜, 沈佳宜, 韓森, 朱立倫, 秦子瑄, 尤佳莉, 許光漢, 何必問, 呂秀蓮, 施崇棠, 張鈞甯";

        // --- 核心演算法：Fisher-Yates 隨機洗牌 ---
        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        // --- 輔助圖示 (SVG) ---
        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconRefresh = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>;
        const IconCopy = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;
        const IconCamera = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;
        const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconGift = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>;
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;

        const App = () => {
            const [tab, setTab] = React.useState('PGY1');
            const [startMonth, setStartMonth] = React.useState(8); 
            const [names, setNames] = React.useState({ PGY1: MOCK_PGY1_NAMES, PGY2: MOCK_PGY2_NAMES });
            const [locks, setLocks] = React.useState({ PGY1: {}, PGY2: {} });
            
            // 核心資料狀態
            const [results, setResults] = React.useState({ PGY1: null, PGY2: null });
            const [drawTimes, setDrawTimes] = React.useState({ PGY1: null, PGY2: null }); 
            
            // 儀式感與互動狀態
            const [isDrawing, setIsDrawing] = React.useState(false);
            const [showResultButton, setShowResultButton] = React.useState(false);
            const [tempResults, setTempResults] = React.useState(null);
            const [isDownloading, setIsDownloading] = React.useState(false);

            const [toast, setToast] = React.useState(null);

            const currentNames = names[tab];
            const currentLocks = locks[tab];
            const currentResults = results[tab];
            const currentSchedule = tab === 'PGY1' ? pgy1Schedule : pgy2Schedule;
            const groupKeys = Object.keys(currentSchedule);

            // 解析名單人數
            const nameArray = currentNames.split(/[\n,、\t]+/).map(n => n.trim()).filter(n => n !== '');
            const totalPeople = nameArray.length;

            const getRealMonth = (mIndex) => {
                let m = (startMonth + mIndex) % 12;
                return m === 0 ? 12 : m;
            };

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3500);
            };

            const handleLockChange = (group, checked) => {
                const newLocks = { ...locks };
                if (checked) {
                    newLocks[tab][group] = 0; 
                } else {
                    delete newLocks[tab][group];
                }
                setLocks(newLocks);
            };

            const handleLockValueChange = (group, val) => {
                const newLocks = { ...locks };
                newLocks[tab][group] = isNaN(val) ? 0 : val;
                setLocks(newLocks);
            };

            const triggerDrawProcess = () => {
                if (totalPeople === 0) {
                    showToast('請先匯入參與抽籤的醫師名單！');
                    return;
                }

                let lockedSum = 0;
                let lockedCount = 0;
                groupKeys.forEach(key => {
                    if (currentLocks[key] !== undefined) {
                        lockedSum += currentLocks[key];
                        lockedCount++;
                    }
                });

                const remainingPeople = totalPeople - lockedSum;
                const unlockedCount = groupKeys.length - lockedCount;

                if (remainingPeople < 0) {
                    showToast('錯誤：指定組別的人數總和已超過名單總人數！');
                    return;
                }
                if (unlockedCount === 0 && remainingPeople > 0) {
                    showToast('錯誤：所有組別皆已指定固定數量，但名單仍有多餘人數未分配！');
                    return;
                }

                // 計算配額
                const quotas = {};
                let baseQuota = 0;
                let remainder = 0;

                if (unlockedCount > 0) {
                    baseQuota = Math.floor(remainingPeople / unlockedCount);
                    remainder = remainingPeople % unlockedCount;
                }

                const unlockedGroups = [];
                groupKeys.forEach(key => {
                    if (currentLocks[key] !== undefined) {
                        quotas[key] = currentLocks[key];
                    } else {
                        quotas[key] = baseQuota;
                        unlockedGroups.push(key);
                    }
                });

                // 將餘數隨機分配給未鎖定的組別
                const shuffledUnlocked = shuffleArray(unlockedGroups);
                for (let i = 0; i < remainder; i++) {
                    quotas[shuffledUnlocked[i]]++;
                }

                // 產生籤筒插槽
                let slots = [];
                groupKeys.forEach(key => {
                    for (let i = 0; i < quotas[key]; i++) {
                        slots.push(key);
                    }
                });

                // 雙重盲抽
                slots = shuffleArray(slots);
                const shuffledNames = shuffleArray(nameArray);

                // 分配結果
                const newResults = groupKeys.map(key => ({
                    group: key,
                    schedule: currentSchedule[key],
                    names: []
                }));

                shuffledNames.forEach((name, index) => {
                    const assignedGroup = slots[index];
                    const groupObj = newResults.find(r => r.group === assignedGroup);
                    if(groupObj) groupObj.names.push(name);
                });

                // 觸發儀式感過場
                setTempResults(newResults);
                setIsDrawing(true);
                setShowResultButton(false);
                setResults({ ...results, [tab]: null }); 

                setTimeout(() => {
                    setIsDrawing(false);
                    setShowResultButton(true);
                }, 2000); 
            };

            const revealResults = () => {
                // 產生精確時間戳記
                const now = new Date();
                const timeStr = now.toLocaleString('zh-TW', { hour12: false });
                
                setDrawTimes(prev => ({ ...prev, [tab]: timeStr }));
                setResults({ ...results, [tab]: tempResults });
                setShowResultButton(false);
                setTempResults(null);
                showToast(`✅ ${tab} 抽籤完成！共分配 ${totalPeople} 人。`);
            };

            const handleDownloadImage = async () => {
                const panel = document.getElementById('draw-results-panel');
                if (!panel) return;

                setIsDownloading(true);
                showToast('正在產生高畫質結果圖片，請稍候...');

                try {
                    // 為了截圖畫面乾淨，暫時隱藏操作按鈕區
                    const actionButtons = document.getElementById('result-action-buttons');
                    if (actionButtons) actionButtons.style.display = 'none';

                    // 運用 html2canvas 生成圖片
                    const canvas = await html2canvas(panel, {
                        scale: 2, // 提高解析度 (Retina 支援)
                        backgroundColor: '#ffffff',
                        useCORS: true,
                        logging: false
                    });

                    // 恢復按鈕顯示
                    if (actionButtons) actionButtons.style.display = 'flex';

                    // 產生下載連結
                    const image = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.href = image;
                    link.download = `${tab}_抽籤結果_${startMonth}月起訓.png`;
                    link.click();

                    showToast('圖片已成功下載！可以直接傳送至群組囉。');
                } catch (error) {
                    console.error('截圖失敗:', error);
                    showToast('圖片產生失敗，請再試一次。');
                    // 確保發生錯誤時按鈕會恢復顯示
                    const actionButtons = document.getElementById('result-action-buttons');
                    if (actionButtons) actionButtons.style.display = 'flex';
                } finally {
                    setIsDownloading(false);
                }
            };

            const handleCopy = () => {
                if (!currentResults) return;
                
                const timeStr = drawTimes[tab] || new Date().toLocaleString('zh-TW', { hour12: false });
                
                let text = `【${tab} 規則班抽籤結果】\n`;
                text += `▶ 起訓月份：${startMonth}月\n`;
                text += `▶ 抽籤時間：${timeStr}\n`;
                text += `--------------------------------------\n\n`;
                
                currentResults.forEach(r => {
                    text += `[${r.group}] (${r.names.length}人)\n`;
                    text += `名單：${r.names.length > 0 ? r.names.join('、') : '無'}\n`;
                    text += `班表：${r.schedule.join(',')}\n\n`;
                });
                
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        navigator.clipboard.writeText(text).then(() => {
                            showToast('已將結果連同時間戳記複製到剪貼簿！');
                        }).catch(err => {
                            throw new Error('Clipboard API blocked');
                        });
                    } else {
                        throw new Error('Fallback required');
                    }
                } catch (err) {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-999999px";
                    textArea.style.top = "-999999px";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    
                    try {
                        document.execCommand('copy');
                        showToast('已將結果連同時間戳記複製到剪貼簿！');
                    } catch (fallbackErr) {
                        showToast('環境限制導致複製失敗，請手動圈選複製。');
                    } finally {
                        textArea.remove();
                    }
                }
            };

            const renderRightPanel = () => {
                if (isDrawing) {
                    return (
                        <div className="flex-grow flex flex-col items-center justify-center space-y-6 py-20 fade-in">
                            <div className="w-16 h-16 border-4 border-brand-red/30 border-t-brand-red rounded-full animate-spin"></div>
                            <p className="text-xl font-bold text-brand-navy animate-pulse">正在進行雙重盲抽與校驗...</p>
                            <p className="text-sm text-slate-500">系統正運用 Fisher-Yates 演算法分配中</p>
                        </div>
                    );
                }

                if (showResultButton) {
                    return (
                        <div className="flex-grow flex flex-col items-center justify-center space-y-8 py-20 scale-in">
                            <div className="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 mb-2 shadow-inner">
                                <IconCheck />
                            </div>
                            <h3 className="text-2xl font-bold text-brand-navy tracking-wide">排班分配已就緒！</h3>
                            <button 
                                onClick={revealResults} 
                                className="flex items-center space-x-2 px-8 py-3.5 bg-brand-red text-white font-bold rounded-full shadow-lg hover:shadow-xl hover:bg-opacity-90 transition-all transform hover:-translate-y-1 active:translate-y-0 text-lg">
                                <IconGift />
                                <span>立即觀看結果</span>
                            </button>
                        </div>
                    );
                }

                if (!currentResults) {
                    return (
                        <div className="flex-grow flex flex-col items-center justify-center text-slate-400 space-y-4 py-16 bg-slate-50/50 rounded-xl border border-dashed border-slate-200 mt-4">
                            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className="opacity-20"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                            <p>請先於左側依序完成設定，並點擊「開始隨機分配」</p>
                        </div>
                    );
                }

                return (
                    <div className="space-y-4 overflow-y-auto pr-2 flex-grow fade-in mt-4">
                        {currentResults.map((res, idx) => (
                            <div key={idx} className="border border-slate-200/80 rounded-xl p-5 bg-white hover:shadow-lg transition-all duration-300 relative overflow-hidden">
                                <div className="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-brand-red to-brand-navy/50 opacity-50"></div>
                                
                                <div className="flex justify-between items-center mb-4 pl-2">
                                    <h3 className="font-black text-lg text-brand-navy">{res.group}</h3>
                                    <span className="text-xs bg-slate-100 text-slate-500 px-2.5 py-1 rounded-md font-bold shadow-sm border border-slate-200/50">分配 {res.names.length} 人</span>
                                </div>
                                
                                <div className="mb-5 flex flex-wrap gap-2 pl-2">
                                    {res.names.length > 0 ? res.names.map((name, nIdx) => (
                                        <span key={nIdx} className="bg-white text-brand-navy border border-slate-200 font-bold text-[13px] px-3 py-1 rounded-full shadow-sm hover:border-brand-red/40 hover:bg-brand-red/5 transition-colors cursor-default">
                                            {name}
                                        </span>
                                    )) : <span className="text-sm text-slate-400 italic">此組別無人分配</span>}
                                </div>

                                <div className="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-12 gap-2 mt-4 pt-4 border-t border-slate-100 pl-2">
                                    {res.schedule.map((courseStr, i) => {
                                        const realMonth = getRealMonth(i);
                                        return (
                                            <div key={i} className="flex flex-col items-center justify-center bg-slate-50/80 border border-slate-100 rounded-lg py-2 px-1 shadow-sm transition-all hover:bg-white hover:border-slate-200 hover:shadow">
                                                <span className="text-[10px] md:text-[11px] text-slate-500 font-medium mb-1 tracking-tight whitespace-nowrap">
                                                    M{i+1} <span className="text-brand-red/80 font-bold">({realMonth}月)</span>
                                                </span>
                                                <span className="text-sm md:text-base font-black text-brand-navy">{courseStr}</span>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-gradient-to-br from-brand-navy to-slate-800 pt-12 pb-16 px-4 text-center shadow-md relative">
                        <h1 className="text-3xl md:text-5xl font-bold text-white tracking-wide mb-4 drop-shadow-sm">PGY 規則班抽籤系統</h1>
                        <p className="text-brand-cream/80 max-w-2xl mx-auto text-sm md:text-base leading-relaxed">
                            嚴格的雙層隨機演算法，確保排班過程絕對公平。
                        </p>
                    </header>

                    <main className="max-w-7xl mx-auto w-full px-4 -mt-8 pb-16 grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8 flex-grow relative z-10">
                        
                        <div className="lg:col-span-5 bg-white p-6 rounded-2xl shadow-xl border border-slate-200/60 flex flex-col fade-in">
                            <h2 className="text-xl font-bold text-brand-navy border-b border-slate-100 pb-4 mb-5 flex items-center">
                                <IconSettings /> <span className="ml-2">抽籤參數設定</span>
                            </h2>
                            
                            <div className="mb-5">
                                <label className="text-sm font-bold text-slate-700 block mb-2">1. 選擇抽籤身分</label>
                                <div className="flex bg-slate-50 p-1.5 rounded-xl border border-slate-100">
                                    <button 
                                        onClick={() => setTab('PGY1')} 
                                        className={`flex-1 py-2.5 rounded-lg font-bold text-sm transition-all shadow-sm ${tab === 'PGY1' ? 'bg-white text-brand-navy ring-1 ring-slate-200' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/40 shadow-none'}`}>
                                        PGY1 規則班
                                    </button>
                                    <button 
                                        onClick={() => setTab('PGY2')} 
                                        className={`flex-1 py-2.5 rounded-lg font-bold text-sm transition-all shadow-sm ${tab === 'PGY2' ? 'bg-white text-brand-navy ring-1 ring-slate-200' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/40 shadow-none'}`}>
                                        PGY2 規則班
                                    </button>
                                </div>
                            </div>

                            <div className="mb-6 bg-slate-50/50 p-4 rounded-xl border border-slate-100">
                                <div className="flex items-center justify-between mb-4 border-b border-slate-200/80 pb-3">
                                    <label className="text-sm font-bold text-slate-700">2. 設定 M1 起訓月份</label>
                                    <select 
                                        value={startMonth} 
                                        onChange={(e) => setStartMonth(parseInt(e.target.value))}
                                        className="py-1.5 px-3 border border-slate-300 bg-white rounded-lg text-sm font-bold text-brand-navy focus:ring-2 focus:ring-brand-red focus:outline-none transition-shadow shadow-sm cursor-pointer"
                                    >
                                        {[...Array(12)].map((_, i) => (
                                            <option key={i+1} value={i+1}>{i+1} 月起訓</option>
                                        ))}
                                    </select>
                                </div>
                                
                                <div className="flex justify-between items-end mb-2 mt-2">
                                    <label className="text-sm font-bold text-slate-700">參與人員名單 <span className="font-normal text-slate-400 ml-1 text-xs">(已預載測試數據)</span></label>
                                    <span className="text-xs bg-brand-red/10 text-brand-red px-2 py-1 rounded-md font-bold shadow-sm border border-brand-red/20">
                                        共 {totalPeople} 人
                                    </span>
                                </div>
                                <textarea 
                                    className="w-full h-24 p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-red focus:border-brand-red transition-all text-sm leading-relaxed text-slate-700 shadow-inner bg-white"
                                    placeholder={`請貼上參與 ${tab} 抽籤的名單（支援換行、逗號或空格分隔）...`}
                                    value={names[tab]}
                                    onChange={(e) => setNames({ ...names, [tab]: e.target.value })}
                                />
                            </div>

                            <div className="flex-grow flex flex-col min-h-0">
                                <label className="text-sm font-bold text-slate-700 mb-1">3. 設定組別數量配置</label>
                                <p className="text-xs text-slate-400 mb-3">勾選並指定特定組別的人數，未勾選的組別系統將自動平均分配。</p>
                                
                                <div className="space-y-2 overflow-y-auto pr-2 flex-grow border border-slate-100 p-2 rounded-xl bg-slate-50/50">
                                    {groupKeys.map(group => {
                                        const isLocked = currentLocks[group] !== undefined;
                                        return (
                                            <div key={group} className={`flex items-center justify-between p-3 border rounded-xl transition-all ${isLocked ? 'bg-white border-brand-red/40 shadow-sm' : 'bg-white border-slate-200/80 hover:border-slate-300'}`}>
                                                <span className="font-bold text-brand-navy w-24 shrink-0 whitespace-nowrap">{group}</span>
                                                <div className="flex items-center space-x-3 shrink-0">
                                                    <label className="flex items-center text-sm cursor-pointer text-slate-600 font-medium">
                                                        <input 
                                                            type="checkbox" 
                                                            className="mr-2 w-4 h-4 text-brand-navy rounded border-slate-300 focus:ring-brand-red cursor-pointer"
                                                            checked={isLocked} 
                                                            onChange={(e) => handleLockChange(group, e.target.checked)}
                                                        />
                                                        固定名額
                                                    </label>
                                                    <input 
                                                        type="number" 
                                                        min="0"
                                                        className={`w-16 p-1.5 border rounded-lg text-center text-sm font-bold transition-all ${!isLocked ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed' : 'bg-white border-brand-red/50 text-brand-navy focus:ring-2 focus:ring-brand-red shadow-sm'}`}
                                                        disabled={!isLocked}
                                                        value={isLocked ? currentLocks[group] : ''}
                                                        placeholder="平均"
                                                        onChange={(e) => handleLockValueChange(group, parseInt(e.target.value))}
                                                    />
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>

                            <button 
                                onClick={triggerDrawProcess}
                                disabled={isDrawing || showResultButton}
                                className={`mt-6 w-full py-3.5 font-bold rounded-xl shadow-md transition-all duration-300 flex justify-center items-center space-x-2 
                                    ${isDrawing || showResultButton 
                                        ? 'bg-slate-200 text-slate-400 cursor-not-allowed' 
                                        : 'bg-brand-navy hover:bg-slate-700 text-white hover:shadow-lg active:scale-[0.98]'}`}>
                                {isDrawing ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <IconRefresh />}
                                <span>{isDrawing ? '演算法運算中...' : '開始隨機分配'}</span>
                            </button>
                        </div>

                        {/* 右側結果面板，加入 id="draw-results-panel" 供截圖對準 */}
                        <div id="draw-results-panel" className="lg:col-span-7 bg-white p-6 rounded-2xl shadow-xl border border-slate-200/60 flex flex-col relative mt-8 lg:mt-0">
                            
                            <div className="flex flex-col sm:flex-row sm:justify-between items-start sm:items-end border-b border-slate-100 pb-4 mb-2 gap-4">
                                <div>
                                    <h2 className="text-xl font-bold text-brand-navy flex items-center">
                                        4. 抽籤結果與班表
                                    </h2>
                                    {currentResults && drawTimes[tab] && (
                                        <p className="text-xs text-slate-400 mt-1.5 flex items-center font-mono font-medium fade-in tracking-tight">
                                            <IconClock /> 系統生成時間：{drawTimes[tab]}
                                        </p>
                                    )}
                                </div>
                                
                                <div id="result-action-buttons" className="flex flex-wrap items-center gap-2">
                                    <button 
                                        onClick={handleDownloadImage}
                                        disabled={!currentResults || isDownloading}
                                        className={`group flex items-center space-x-1.5 px-4 py-2 rounded-lg text-sm font-bold transition-all border 
                                            ${!currentResults || isDownloading
                                                ? 'bg-slate-50 border-slate-200 text-slate-400 cursor-not-allowed' 
                                                : 'bg-white border-slate-200 text-slate-600 hover:text-brand-navy hover:border-brand-navy/30 hover:bg-brand-navy/5 shadow-sm active:scale-95'}`}>
                                        <span className="text-slate-400 group-hover:text-brand-navy transition-colors">
                                            {isDownloading ? <div className="w-4 h-4 border-2 border-slate-300 border-t-brand-navy rounded-full animate-spin"></div> : <IconCamera />}
                                        </span>
                                        <span>{isDownloading ? '處理中' : '下載圖片'}</span>
                                    </button>

                                    <button 
                                        onClick={handleCopy}
                                        disabled={!currentResults}
                                        className={`group flex items-center space-x-1.5 px-4 py-2 rounded-lg text-sm font-bold transition-all border 
                                            ${!currentResults 
                                                ? 'bg-slate-50 border-slate-200 text-slate-400 cursor-not-allowed' 
                                                : 'bg-white border-slate-200 text-slate-600 hover:text-brand-red hover:border-brand-red/30 hover:bg-brand-red/5 shadow-sm active:scale-95'}`}>
                                        <span className="text-slate-400 group-hover:text-brand-red transition-colors"><IconCopy /></span>
                                        <span>複製文字</span>
                                    </button>
                                </div>
                            </div>

                            <div className="bg-slate-50 border border-slate-200/80 rounded-xl p-4 my-4 text-sm shadow-sm">
                                <h4 className="font-bold mb-2 flex items-center text-brand-navy"><IconInfo /> {tab} 排班原則參照</h4>
                                {tab === 'PGY1' ? (
                                    <ul className="list-disc pl-6 space-y-1.5 text-slate-600">
                                        <li><span className="font-bold text-slate-800">社區：</span>不做為第一站訓練 (M1)，且安排於 <span className="text-brand-red font-bold">偶數月</span> 起訓。</li>
                                        <li><span className="font-bold text-slate-800">外科：</span>安排於 <span className="text-brand-red font-bold">偶數月</span> 起訓。</li>
                                        <li><span className="font-bold text-slate-800">內科：</span>安排於 <span className="text-brand-red font-bold">8、11、2、5 月</span> 起訓。</li>
                                    </ul>
                                ) : (
                                    <ul className="list-disc pl-6 space-y-1.5 text-slate-600">
                                        <li>不分科依表上安排，若為分科，其 3+4 的專科訓練則是依標註 <span className="font-bold text-brand-red">#</span> 站別進行安排。</li>
                                        <li>若Y2起訓非八月，則隔年8月起剩餘未安排的站別由教學部依訓練連續性原則安排。</li>
                                    </ul>
                                )}
                            </div>

                            {renderRightPanel()}
                        </div>

                    </main>

                    {toast && (
                        <div className="fixed bottom-6 right-6 bg-brand-navy text-white px-6 py-4 rounded-xl shadow-2xl flex items-center space-x-3 fade-in z-50 max-w-sm border border-slate-600">
                            <IconAlert className="text-brand-red" />
                            <span className="text-sm font-medium leading-relaxed">{toast}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
