<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>甄選進度即時看板</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#003566',
            accent: '#fca311',
            highlight: '#fef9c3',
            base: '#f8fafc'
          },
          fontFamily: {
            sans: ['Inter', 'Noto Sans TC', 'sans-serif']
          }
        }
      }
    }
  </script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { background-color: #f8fafc; overflow-x: hidden; }
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .pulse-bg { animation: pulseBg 2s infinite; }
    @keyframes pulseBg { 0% { box-shadow: 0 0 0 0 rgba(252, 163, 17, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(252, 163, 17, 0); } 100% { box-shadow: 0 0 0 0 rgba(252, 163, 17, 0); } }
    
    /* 隱藏捲軸但保留捲動功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="font-sans text-slate-800 min-h-screen lg:h-screen flex flex-col relative">

  <!-- Header -->
  <header class="bg-primary text-white py-4 lg:py-5 px-4 lg:px-8 shadow-lg flex flex-col md:flex-row justify-between items-center z-10 shrink-0 gap-4">
    <div class="flex items-center gap-3 w-full md:w-auto justify-center md:justify-start">
      <i data-lucide="monitor-play" class="w-6 h-6 lg:w-8 lg:h-8 text-accent shrink-0"></i>
      <div class="text-center md:text-left">
        <h1 class="text-xl lg:text-3xl font-black tracking-widest text-white">甄選面談進度叫號看板</h1>
        <p class="text-highlight text-xs lg:text-sm mt-0.5 tracking-wider opacity-90 hidden sm:block">INTERVIEW PROGRESS BOARD</p>
      </div>
    </div>
    
    <div class="flex flex-col sm:flex-row items-center gap-3 lg:gap-6 w-full md:w-auto justify-between md:justify-end">
      
      <!-- 手機版專屬工具列容器 (包含篩選與重整按鈕) -->
      <div class="flex w-full sm:w-auto gap-2">
        <!-- 篩選組別選擇器 (結合 localStorage) -->
        <div class="flex-1 sm:flex-none flex items-center gap-2 bg-white/10 px-3 py-1.5 rounded-lg border border-white/20 justify-center transition-colors hover:bg-white/20">
          <i data-lucide="filter" class="w-4 h-4 text-accent shrink-0"></i>
          <select id="groupSelector" onchange="setFilteredGroup(this.value)" class="bg-transparent text-white text-sm font-bold outline-none cursor-pointer w-full sm:w-auto *:text-slate-800 appearance-none pr-4">
            <option value="">🔍 篩選我的組別 (顯示全部)</option>
            <!-- 選項由 JS 動態產生 -->
          </select>
        </div>

        <!-- 手機版手動重整按鈕 -->
        <button onclick="manualRefresh()" class="sm:hidden bg-white/10 px-3 py-1.5 rounded-lg border border-white/20 transition-colors hover:bg-white/20 flex items-center justify-center active:scale-95">
          <i data-lucide="refresh-cw" class="refresh-icon w-4 h-4 text-accent"></i>
        </button>
      </div>

      <!-- 時段切換 -->
      <div class="bg-white/10 p-1 rounded-lg flex gap-1 w-full sm:w-auto justify-center shrink-0">
        <button onclick="setSession('上午')" id="btnMorning" class="flex-1 sm:flex-none px-4 lg:px-6 py-2 rounded-md font-bold text-sm transition-colors bg-accent text-primary">上午場</button>
        <button onclick="setSession('下午')" id="btnAfternoon" class="flex-1 sm:flex-none px-4 lg:px-6 py-2 rounded-md font-bold text-sm transition-colors text-white hover:bg-white/20">下午場</button>
      </div>

      <!-- 時鐘與更新提示 -->
      <div class="text-center md:text-right flex flex-col items-center md:items-end shrink-0 hidden sm:flex">
        <div id="currentTime" class="text-xl lg:text-2xl font-bold font-mono text-highlight">00:00:00</div>
        <button onclick="manualRefresh()" class="text-[10px] lg:text-xs text-slate-300 flex items-center gap-1 mt-1 hover:text-white transition-colors group cursor-pointer active:scale-95">
          <i data-lucide="refresh-cw" class="refresh-icon w-3 h-3 group-hover:rotate-180 transition-transform duration-300"></i> 
          系統每 15 秒更新 <span class="text-accent opacity-80 group-hover:opacity-100 transition-opacity ml-0.5">(點擊重整)</span>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 flex flex-col lg:flex-row gap-4 lg:gap-6 p-4 lg:p-6 lg:overflow-hidden max-w-[1920px] mx-auto w-full relative">
    
    <!-- 左側：準備區 (前三順位) -->
    <div class="w-full lg:w-5/12 flex flex-col gap-3 lg:gap-4 lg:h-full shrink-0">
      <div class="bg-accent rounded-xl lg:rounded-t-2xl py-2 lg:py-3 px-4 lg:px-6 shadow-md flex items-center gap-2 lg:gap-3 shrink-0">
        <i data-lucide="bell-ring" class="w-5 h-5 lg:w-6 lg:h-6 text-primary"></i>
        <h2 class="text-xl lg:text-2xl font-black text-primary tracking-wide">即將面談 (準備區)</h2>
      </div>
      
      <div id="preparingList" class="flex-col gap-3 lg:gap-4 lg:overflow-y-auto no-scrollbar lg:pb-4 flex">
        <!-- 載入中畫面 -->
        <div class="h-48 lg:h-full flex flex-col items-center justify-center text-slate-400">
          <i data-lucide="loader-2" class="w-10 h-10 lg:w-12 lg:h-12 animate-spin mb-4 text-accent"></i>
          <p class="text-lg lg:text-xl font-bold">載入即時進度中...</p>
        </div>
      </div>
    </div>

    <!-- 右側：報到名單進度 -->
    <div class="w-full lg:w-7/12 flex flex-col lg:h-full bg-white rounded-xl lg:rounded-2xl shadow-lg border border-slate-100 lg:overflow-hidden">
      <div class="bg-slate-100 py-3 lg:py-4 px-4 lg:px-8 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 shrink-0">
        <h2 class="text-lg lg:text-xl font-bold text-primary flex items-center gap-2">
          <i data-lucide="users" class="w-5 h-5"></i> 現場候位名單
        </h2>
        <div class="flex flex-wrap gap-3 text-xs lg:text-sm font-medium">
          <span class="flex items-center gap-1 text-slate-500"><span class="w-2.5 h-2.5 lg:w-3 lg:h-3 rounded-full bg-slate-200"></span> 尚未報到</span>
          <span class="flex items-center gap-1 text-emerald-600"><span class="w-2.5 h-2.5 lg:w-3 lg:h-3 rounded-full bg-emerald-100 border border-emerald-400"></span> 已報到等待中</span>
          <span class="flex items-center gap-1 text-slate-300"><span class="w-2.5 h-2.5 lg:w-3 lg:h-3 rounded-full bg-slate-50 border border-slate-200"></span> 面談完成</span>
        </div>
      </div>
      
      <div class="flex-1 lg:overflow-y-auto p-2 lg:p-0 no-scrollbar">
        <table class="w-full text-left border-collapse">
          <thead class="hidden lg:table-header-group sticky top-0 bg-white/95 backdrop-blur-sm z-10 shadow-sm">
            <tr class="text-slate-500 text-sm">
              <th class="py-3 px-6 font-bold w-28">組別</th>
              <th class="py-3 px-6 font-bold w-24">編號</th>
              <th class="py-3 px-6 font-bold">姓名</th>
              <th class="py-3 px-6 font-bold text-center">當前狀態</th>
            </tr>
          </thead>
          <tbody id="waitingListTable" class="flex flex-col lg:table-row-group gap-2 lg:gap-0">
            <!-- 由 JS 動態生成 -->
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- 橫式/大螢幕專用：左下角 QR Code 引導區塊 -->
  <div class="fixed bottom-6 left-6 z-50 hidden lg:flex flex-col items-center gap-2 bg-white p-4 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border-2 border-slate-100 fade-in transition-transform hover:-translate-y-2 group">
    <div class="flex items-center gap-1.5 mb-1">
      <i data-lucide="smartphone" class="w-5 h-5 text-primary"></i>
      <p class="text-sm font-black text-primary tracking-wide">用手機看更方便</p>
    </div>
    <div class="bg-slate-50 p-2 rounded-xl border border-slate-200 group-hover:border-accent transition-colors">
      <!-- 使用第三方 API 動態產生目標網址的 QR Code -->
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://ekatsiming-dev.github.io/2026PGY/0315visit.html&color=003566&bgcolor=f8fafc" 
           alt="掃描查詢進度 QR Code" 
           class="w-24 h-24 mix-blend-multiply">
    </div>
    <p class="text-[11px] text-slate-500 font-bold mt-1 tracking-wider">掃描隨時追蹤叫號進度</p>
  </div>

  <script>
    // --- 參數設定 ---
    const API_URL = 'https://script.google.com/macros/s/AKfycbzKLj8037In2HuIuOLHwlB_p6UgFAf3dIWcegnZWKAHsME5iYpdSNxzxgPFw85q5oK2aA/exec';
    let currentSession = new Date().getHours() < 12 ? '上午' : '下午'; 
    let lastDataStr = '';
    let cachedData = []; // 用於本地重新渲染
    
    // 初始化讀取 localStorage 記憶的篩選組別
    let filteredGroup = localStorage.getItem('filteredGroup') || '';

    // --- DOM 綁定 ---
    const preparingList = document.getElementById('preparingList');
    const waitingListTable = document.getElementById('waitingListTable');
    const timeDisplay = document.getElementById('currentTime');
    const btnMorning = document.getElementById('btnMorning');
    const btnAfternoon = document.getElementById('btnAfternoon');
    const groupSelector = document.getElementById('groupSelector');

    // --- 初始化 ---
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      updateClock();
      setInterval(updateClock, 1000);
      updateSessionButtons();
      fetchData();
      setInterval(fetchData, 15000);
    });

    // 設定篩選組別並儲存
    function setFilteredGroup(val) {
      filteredGroup = val;
      if(val) {
        localStorage.setItem('filteredGroup', val);
      } else {
        localStorage.removeItem('filteredGroup');
      }
      // 選擇後立即重新渲染畫面，不需等待 API
      if(cachedData.length > 0) {
        processAndRender(cachedData, true);
      }
    }

    function updateClock() {
      const now = new Date();
      timeDisplay.textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
    }

    function setSession(session) {
      currentSession = session;
      updateSessionButtons();
      lastDataStr = ''; 
      fetchData();
    }

    function updateSessionButtons() {
      const activeClass = 'flex-1 sm:flex-none px-4 lg:px-6 py-2 rounded-md font-bold text-sm transition-colors bg-accent text-primary shadow-sm';
      const inactiveClass = 'flex-1 sm:flex-none px-4 lg:px-6 py-2 rounded-md font-bold text-sm transition-colors text-white hover:bg-white/20';
      if (currentSession === '上午') {
        btnMorning.className = activeClass;
        btnAfternoon.className = inactiveClass;
      } else {
        btnAfternoon.className = activeClass;
        btnMorning.className = inactiveClass;
      }
    }

    function maskName(name) {
      if (!name) return '未知';
      const str = String(name).trim();
      if (str.length <= 1) return str;
      if (str.length === 2) return str[0] + '○';
      return str[0] + '○' + str.substring(2);
    }

    // 手動重整觸發器
    function manualRefresh() {
      fetchData(true);
    }

    async function fetchData(isManual = false) {
      // 若為手動重整，讓 icon 轉動給予視覺回饋
      const icons = document.querySelectorAll('.refresh-icon');
      if (isManual) icons.forEach(i => i.classList.add('animate-spin'));

      try {
        // 【關鍵修復】加入時間戳章 (Cache-Busting)，打破瀏覽器對 GET 請求的快取限制
        const noCacheUrl = `${API_URL}?t=${new Date().getTime()}`;
        const response = await fetch(noCacheUrl);
        const result = await response.json();
        
        if (result.status === 'success') {
          cachedData = result.data;
          const newDataStr = JSON.stringify(result.data);
          
          // 如果是手動更新，或資料確實有變動，就重新渲染畫面
          if (isManual || newDataStr !== lastDataStr) {
            processAndRender(cachedData);
            lastDataStr = newDataStr;
          }
        }
      } catch (error) {
        console.error('抓取資料失敗:', error);
      } finally {
        // 請求結束後移除轉動動畫
        if (isManual) icons.forEach(i => i.classList.remove('animate-spin'));
      }
    }

    function processAndRender(data, forceRender = false) {
      let sessionData = data.filter(c => c['時段'] === currentSession);

      // 1. 動態產生選單的組別選項 (使用全場資料產生，不受篩選影響)
      const uniqueGroups = [...new Set(sessionData.map(c => c['組別']))].filter(Boolean).sort((a, b) => parseInt(a) - parseInt(b));
      let optionsHtml = '<option value="">🔍 篩選我的組別 (顯示全部)</option>';
      uniqueGroups.forEach(g => {
        optionsHtml += `<option value="${g}" ${g === filteredGroup ? 'selected' : ''}>第 ${g} 組</option>`;
      });
      // 只有當選項不同時才更新 DOM，避免影響使用者操作
      if (groupSelector.innerHTML !== optionsHtml) {
        groupSelector.innerHTML = optionsHtml;
      }

      // 2. 排序
      sessionData.sort((a, b) => {
        let gA = parseInt(a['組別']) || 0;
        let gB = parseInt(b['組別']) || 0;
        if (gA !== gB) return gA - gB;
        let nA = parseInt(a['NO'] || a['ID']) || 0;
        let nB = parseInt(b['NO'] || b['ID']) || 0;
        return nA - nB;
      });

      // 3. 邏輯判斷：計算全場的報到狀態與準備順位 (必須在過濾前計算，才能確保全域順位正確)
      let preparingCount = 0;
      sessionData = sessionData.map(c => {
        let status = 'not_arrived'; 
        let orderInQueue = -1;

        if (c.status_interview) {
          status = 'completed'; 
        } else if (c.status_checkin) {
          if (preparingCount < 3) {
            status = 'preparing'; 
            orderInQueue = preparingCount + 1;
            preparingCount++;
          } else {
            status = 'waiting'; 
          }
        }
        return { ...c, boardStatus: status, orderInQueue };
      });

      // 4. 根據篩選條件過濾資料供畫面顯示
      let displayData = sessionData;
      if (filteredGroup) {
        displayData = sessionData.filter(c => c['組別'] === filteredGroup);
      }

      // 5. 渲染畫面
      renderPreparingList(displayData.filter(c => c.boardStatus === 'preparing'));
      renderWaitingTable(displayData);
    }

    function renderPreparingList(preparingData) {
      if (preparingData.length === 0) {
        let emptyMsg = filteredGroup ? `此組別目前無等候中名單` : `目前無等候中名單`;
        preparingList.innerHTML = `
          <div class="h-32 lg:h-full flex flex-col items-center justify-center text-slate-400 bg-white rounded-xl lg:rounded-2xl border-2 border-dashed border-slate-200">
            <i data-lucide="coffee" class="w-10 h-10 lg:w-16 lg:h-16 mb-2 lg:mb-4 opacity-40"></i>
            <p class="text-lg lg:text-xl font-bold">${emptyMsg}</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      preparingList.innerHTML = preparingData.map((c, index) => {
        // 移除了追蹤的高亮樣式，回歸統一的質感風格
        return `
          <div class="bg-highlight border-2 border-accent rounded-xl lg:rounded-2xl p-4 lg:p-6 shadow-md lg:shadow-lg pulse-bg fade-in relative overflow-hidden flex flex-col justify-center transition-all">
            <div class="absolute top-0 right-0 bg-accent text-primary font-black text-sm lg:text-xl px-3 py-1 lg:px-5 lg:py-2 rounded-bl-xl lg:rounded-bl-2xl">
              全場順位 ${c.orderInQueue}
            </div>
            <div class="flex items-end gap-3 lg:gap-4 mb-2 lg:mb-4 mt-4 lg:mt-2">
              <div class="text-5xl lg:text-6xl font-black text-primary tracking-wider">${c['NO'] || c['ID']}</div>
              <div class="text-lg lg:text-2xl font-bold text-slate-600 mb-1 lg:mb-1 flex items-center gap-1">
                第 ${c['組別']} 組
              </div>
            </div>
            <div class="text-2xl lg:text-4xl font-black text-slate-800 mb-4 lg:mb-6 tracking-widest">${maskName(c['姓名'])}</div>
            
            <div class="bg-primary text-white rounded-lg lg:rounded-xl p-3 lg:p-4 flex items-center justify-center gap-2 lg:gap-3 shadow-inner">
              <i data-lucide="arrow-right-circle" class="w-5 h-5 lg:w-8 lg:h-8 text-accent animate-bounce"></i>
              <span class="text-sm lg:text-2xl font-bold tracking-wider">請到會議廳等待</span>
            </div>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    function renderWaitingTable(displayData) {
      if (displayData.length === 0) {
        waitingListTable.innerHTML = `<tr class="flex lg:table-row"><td colspan="4" class="py-12 text-center text-slate-400 font-bold text-lg w-full">查無考生資料</td></tr>`;
        return;
      }

      waitingListTable.innerHTML = displayData.map(c => {
        let statusBadge = '';
        let rowClass = `flex flex-col lg:table-row bg-white lg:bg-transparent border lg:border-none lg:border-b lg:border-slate-100 transition-colors text-base lg:text-lg fade-in rounded-xl lg:rounded-none shadow-sm lg:shadow-none p-3 lg:p-0 border-slate-100 hover:bg-slate-50 `;

        switch (c.boardStatus) {
          case 'preparing':
            statusBadge = `<span class="inline-flex justify-center w-full lg:w-auto items-center gap-1.5 bg-accent/20 text-amber-700 px-4 py-1.5 rounded-full font-bold text-xs lg:text-sm border border-accent/30"><i data-lucide="megaphone" class="w-4 h-4"></i> 準備叫號</span>`;
            rowClass += 'bg-highlight/20 lg:bg-highlight/30 border-accent/30';
            break;
          case 'waiting':
            statusBadge = `<span class="inline-flex justify-center w-full lg:w-auto items-center gap-1.5 bg-emerald-50 text-emerald-700 px-4 py-1.5 rounded-full font-bold text-xs lg:text-sm border border-emerald-200"><i data-lucide="user-check" class="w-4 h-4"></i> 等候中</span>`;
            break;
          case 'completed':
            statusBadge = `<span class="inline-flex justify-center w-full lg:w-auto items-center gap-1.5 bg-slate-100 text-slate-400 px-4 py-1.5 rounded-full font-bold text-xs lg:text-sm"><i data-lucide="check" class="w-4 h-4"></i> 已完成</span>`;
            rowClass += 'opacity-60 lg:grayscale'; 
            break;
          case 'not_arrived':
            statusBadge = `<span class="inline-flex justify-center w-full lg:w-auto items-center gap-1.5 text-slate-400 px-4 py-1.5 text-xs lg:text-sm font-medium">尚未報到</span>`;
            rowClass += 'text-slate-400';
            break;
        }

        return `
          <tr class="${rowClass}">
            <td class="flex justify-between items-center lg:table-cell py-1.5 lg:py-4 px-2 lg:px-6 font-bold text-slate-600 border-b border-slate-50 lg:border-none">
              <span class="lg:hidden text-xs text-slate-400 font-normal">組別</span>
              第 ${c['組別']} 組
            </td>
            <td class="flex justify-between items-center lg:table-cell py-1.5 lg:py-4 px-2 lg:px-6 font-black text-primary border-b border-slate-50 lg:border-none">
              <span class="lg:hidden text-xs text-slate-400 font-normal">編號</span>
              ${c['NO'] || c['ID']}
            </td>
            <td class="flex justify-between items-center lg:table-cell py-1.5 lg:py-4 px-2 lg:px-6 font-bold tracking-widest border-b border-slate-50 lg:border-none">
              <span class="lg:hidden text-xs text-slate-400 font-normal">姓名</span>
              ${maskName(c['姓名'])}
            </td>
            <td class="flex justify-center lg:table-cell py-2 lg:py-4 px-2 lg:px-6 text-center mt-2 lg:mt-0">
              ${statusBadge}
            </td>
          </tr>
        `;
      }).join('');
      lucide.createIcons();
    }
  </script>
</body>
</html>
