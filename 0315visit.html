<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>甄選進度即時看板</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#003566',
            accent: '#fca311',
            highlight: '#fef9c3',
            base: '#f8fafc'
          },
          fontFamily: {
            sans: ['Inter', 'Noto Sans TC', 'sans-serif']
          }
        }
      }
    }
  </script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { background-color: #f8fafc; overflow-x: hidden; }
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .pulse-bg { animation: pulseBg 2s infinite; }
    @keyframes pulseBg { 0% { box-shadow: 0 0 0 0 rgba(252, 163, 17, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(252, 163, 17, 0); } 100% { box-shadow: 0 0 0 0 rgba(252, 163, 17, 0); } }
    .pulse-red { animation: pulseRed 2s infinite; }
    @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    
    /* 隱藏捲軸但保留捲動功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="font-sans text-slate-800 min-h-screen lg:h-screen flex flex-col">

  <!-- Header: 稍微壓縮上下 padding 以節省垂直空間 -->
  <header class="bg-primary text-white py-3 lg:py-4 px-4 lg:px-6 shadow-lg flex flex-col md:flex-row justify-between items-center z-20 shrink-0 gap-3">
    <div class="flex items-center gap-3 lg:gap-4 w-full md:w-auto justify-center md:justify-start">
      <div class="bg-white p-1 rounded-lg shadow-sm shrink-0">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&margin=1&data=https://ekatsiming-dev.github.io/2026PGY/0315visit.html" alt="手機版 QR Code" class="w-10 h-10 lg:w-14 lg:h-14 object-contain">
      </div>
      <div class="text-left">
        <h1 class="text-lg lg:text-2xl font-black tracking-widest text-white flex items-center gap-2">
          甄選面談進度看板
        </h1>
        <div class="text-highlight text-xs mt-0.5 tracking-wider opacity-90 flex items-center gap-2">
          <span>掃描左側條碼即可手機即時看</span>
        </div>
      </div>
    </div>
    
    <div class="flex flex-col sm:flex-row items-center gap-3 lg:gap-5 w-full md:w-auto justify-between md:justify-end">
      <!-- 時段切換 -->
      <div class="bg-white/10 p-1 rounded-lg flex gap-1 w-full sm:w-auto justify-center">
        <button onclick="setSession('上午')" id="btnMorning" class="flex-1 sm:flex-none px-4 lg:px-5 py-1.5 rounded-md font-bold text-sm transition-colors bg-accent text-primary">上午場</button>
        <button onclick="setSession('下午')" id="btnAfternoon" class="flex-1 sm:flex-none px-4 lg:px-5 py-1.5 rounded-md font-bold text-sm transition-colors text-white hover:bg-white/20">下午場</button>
      </div>
      <!-- 時鐘與更新提示 -->
      <div class="text-center md:text-right flex flex-col items-center md:items-end">
        <div id="currentTime" class="text-lg lg:text-xl font-bold font-mono text-highlight">00:00:00</div>
        <div class="text-[10px] text-slate-300 flex items-center gap-2 mt-0.5">
          <span class="flex items-center gap-1"><i data-lucide="refresh-cw" class="w-3 h-3 animate-spin hidden" id="autoRefreshIcon"></i> 自動每15秒更新</span>
          <button onclick="manualRefresh()" class="bg-white/20 hover:bg-white/30 text-white px-2 py-0.5 rounded transition-colors flex items-center gap-1">
            <i data-lucide="rotate-cw" id="manualRefreshIcon" class="w-3 h-3"></i> 立即更新
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- 主要內容區 -->
  <main class="flex-1 flex flex-col p-3 lg:p-4 lg:overflow-hidden max-w-[1400px] mx-auto w-full gap-3 relative">
    
    <!-- 現場候位名單 -->
    <div class="w-full flex flex-col lg:h-full bg-white rounded-xl shadow-lg border border-slate-100 lg:overflow-hidden relative flex-1">
      
      <!-- 表頭與過濾控制區 -->
      <div class="bg-slate-50 py-2.5 lg:py-3 px-4 lg:px-5 border-b border-slate-200 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-3 shrink-0 z-10">
        <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto justify-between lg:justify-start">
          <h2 class="text-base lg:text-xl font-black text-primary flex items-center gap-2">
            <i data-lucide="users" class="w-5 h-5 text-accent"></i> 現場候位名單
          </h2>
          
          <div class="flex items-center gap-3">
            <!-- 組別篩選器 -->
            <div class="relative">
              <select id="groupFilter" onchange="applyFilter()" class="appearance-none bg-white border border-slate-300 text-slate-700 font-bold py-1.5 pl-3 pr-8 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent text-sm cursor-pointer">
                <option value="ALL">全部組別</option>
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-500">
                <i data-lucide="chevron-down" class="w-4 h-4"></i>
              </div>
            </div>

            <!-- 顯示全部勾選框 -->
            <label class="flex items-center gap-2 cursor-pointer bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm hover:bg-slate-50 transition-colors select-none">
              <input type="checkbox" id="showAllCheckbox" onchange="applyFilter()" class="w-4 h-4 rounded text-accent focus:ring-accent accent-accent cursor-pointer">
              <span class="text-sm font-bold text-slate-700">顯示完整名單</span>
            </label>
          </div>
        </div>
        
        <!-- 狀態圖例區 (精簡化) -->
        <div class="flex flex-wrap items-center gap-3 text-xs font-medium w-full lg:w-auto justify-start lg:justify-end">
          <span class="flex items-center gap-1 text-slate-500"><span class="w-2.5 h-2.5 rounded-full bg-slate-200"></span> 尚未報到</span>
          <span class="flex items-center gap-1 text-emerald-600"><span class="w-2.5 h-2.5 rounded-full bg-emerald-100 border border-emerald-400"></span> 等候中</span>
          <span class="flex items-center gap-1 text-slate-300"><span class="w-2.5 h-2.5 rounded-full bg-slate-50 border border-slate-200"></span> 面談完成</span>
        </div>
      </div>

      <!-- 視訊等候名單 -->
      <div id="videoSection" class="bg-slate-50 border-b border-slate-200 px-4 py-2.5 shrink-0 hidden fade-in">
        <div class="flex justify-between items-center mb-1.5">
          <h3 class="font-bold text-primary text-sm flex items-center gap-1.5"><i data-lucide="video" class="w-4 h-4"></i> 視訊面談等候區</h3>
          <button id="videoToggleBtn" onclick="toggleVideoExpand()" class="text-xs font-bold text-accent hover:text-primary transition-colors flex items-center gap-1 hidden">
            <span>展開全部</span> <i data-lucide="chevron-down" class="w-3 h-3"></i>
          </button>
        </div>
        <div id="videoContainer" class="flex flex-wrap gap-2">
          <!-- 視訊名單動態生成 -->
        </div>
      </div>
      
      <!-- 表格內容區 -->
      <div class="flex-1 lg:overflow-y-auto p-2 lg:p-0 no-scrollbar relative">
        <table class="w-full text-left border-collapse">
          <thead class="hidden lg:table-header-group sticky top-0 bg-white/95 backdrop-blur-sm z-10 shadow-sm">
            <tr class="text-slate-500 text-sm border-b border-slate-200">
              <th class="py-2.5 px-6 font-bold w-32">組別</th>
              <!-- 已移除組序欄位 -->
              <th class="py-2.5 px-6 font-bold w-1/3">姓名</th>
              <th class="py-2.5 px-6 font-bold text-center">當前狀態</th>
            </tr>
          </thead>
          <tbody id="waitingListTable" class="flex flex-col lg:table-row-group gap-2 lg:gap-0 pb-4">
            <!-- 由 JS 動態生成 -->
            <tr class="flex lg:table-row"><td colspan="3" class="py-12 text-center text-slate-400 font-bold text-base w-full"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2 text-accent"></i>載入資料中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzKLj8037In2HuIuOLHwlB_p6UgFAf3dIWcegnZWKAHsME5iYpdSNxzxgPFw85q5oK2aA/exec';
    let currentSession = new Date().getHours() < 12 ? '上午' : '下午'; 
    let lastDataStr = '';
    
    let allProcessedData = []; 
    let allVideoWaitingData = [];
    let currentFilter = 'ALL';
    let isVideoExpanded = false;

    const waitingListTable = document.getElementById('waitingListTable');
    const timeDisplay = document.getElementById('currentTime');
    const btnMorning = document.getElementById('btnMorning');
    const btnAfternoon = document.getElementById('btnAfternoon');
    const groupFilter = document.getElementById('groupFilter');
    const showAllCheckbox = document.getElementById('showAllCheckbox');

    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      updateClock();
      setInterval(updateClock, 1000);
      updateSessionButtons();
      fetchData();
      
      setInterval(() => {
        const autoIcon = document.getElementById('autoRefreshIcon');
        autoIcon.classList.remove('hidden');
        fetchData().finally(() => {
          setTimeout(() => autoIcon.classList.add('hidden'), 1000);
        });
      }, 15000);
    });

    function updateClock() {
      const now = new Date();
      timeDisplay.textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
    }

    async function manualRefresh() {
      const icon = document.getElementById('manualRefreshIcon');
      icon.classList.add('animate-spin');
      lastDataStr = ''; 
      await fetchData();
      setTimeout(() => icon.classList.remove('animate-spin'), 800);
    }

    function setSession(session) {
      currentSession = session;
      updateSessionButtons();
      lastDataStr = ''; 
      currentFilter = 'ALL';
      // 預設不要勾選「顯示完整名單」
      showAllCheckbox.checked = false;
      waitingListTable.innerHTML = `<tr class="flex lg:table-row"><td colspan="3" class="py-12 text-center text-slate-400 font-bold text-base w-full"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2 text-accent"></i>切換時段中...</td></tr>`;
      lucide.createIcons();
      fetchData();
    }

    function updateSessionButtons() {
      const activeClass = 'flex-1 sm:flex-none px-4 lg:px-5 py-1.5 rounded-md font-bold text-sm transition-colors bg-accent text-primary shadow-sm';
      const inactiveClass = 'flex-1 sm:flex-none px-4 lg:px-5 py-1.5 rounded-md font-bold text-sm transition-colors text-white hover:bg-white/20 border border-transparent';
      if (currentSession === '上午') {
        btnMorning.className = activeClass;
        btnAfternoon.className = inactiveClass;
      } else {
        btnAfternoon.className = activeClass;
        btnMorning.className = inactiveClass;
      }
    }

    async function fetchData() {
      try {
        const response = await fetch(API_URL);
        const result = await response.json();
        if (result.status === 'success') {
          const newDataStr = JSON.stringify(result.data);
          if (newDataStr !== lastDataStr) {
            processAndRender(result.data);
            lastDataStr = newDataStr;
          }
        }
      } catch (error) {
        console.error('抓取資料失敗:', error);
      }
    }

    function updateFilterOptions(groupsKeys) {
      const currentVal = groupFilter.value;
      let html = `<option value="ALL">全部組別</option>`;
      groupsKeys.sort((a, b) => parseInt(a) - parseInt(b)).forEach(g => {
        html += `<option value="${g}">第 ${g} 組</option>`;
      });
      groupFilter.innerHTML = html;
      
      if (groupsKeys.includes(currentVal)) {
        groupFilter.value = currentVal;
      } else {
        groupFilter.value = 'ALL';
        currentFilter = 'ALL';
      }
    }

    function applyFilter() {
      currentFilter = groupFilter.value;
      renderWaitingTable();
    }

    function toggleVideoExpand() {
      isVideoExpanded = !isVideoExpanded;
      renderVideoSection();
    }

    function processAndRender(data) {
      let sessionData = data.filter(c => c['時段'] === currentSession);
      let normalData = sessionData.filter(c => String(c['組別']).trim() !== '視');
      let videoDataRaw = sessionData.filter(c => String(c['組別']).trim() === '視');

      let groups = {};
      normalData.forEach(c => {
        let g = c['組別'] || '未分組';
        if (!groups[g]) groups[g] = [];
        c.parsedOrder = parseInt(c['組序'], 10) || 0;
        groups[g].push(c);
      });

      updateFilterOptions(Object.keys(groups));
      allProcessedData = [];

      Object.keys(groups).forEach(g => {
        let groupMembers = groups[g];
        let maxCompletedOrder = 0;

        groupMembers.forEach(member => {
          if (member.status_interview) {
            maxCompletedOrder = Math.max(maxCompletedOrder, member.parsedOrder);
          }
        });

        let callLimit = maxCompletedOrder + 3;

        groupMembers.forEach(member => {
          member.isMissedTurn = false;
          if (member.status_interview) {
            member.boardStatus = 'completed';
          } else if (member.status_checkin) {
            if (member.parsedOrder <= callLimit) {
              member.boardStatus = 'preparing';
              if (member.parsedOrder <= maxCompletedOrder) {
                member.isMissedTurn = true; 
              }
            } else {
              member.boardStatus = 'waiting';
            }
          } else {
            member.boardStatus = 'not_arrived';
          }
          allProcessedData.push(member);
        });
      });

      // 排序維持：組別 -> 隱藏的組序
      allProcessedData.sort((a, b) => {
        let gA = parseInt(a['組別']) || 0;
        let gB = parseInt(b['組別']) || 0;
        if (gA !== gB) return gA - gB;
        return a.parsedOrder - b.parsedOrder;
      });

      allVideoWaitingData = videoDataRaw.filter(c => c.status_checkin && !c.status_interview);
      allVideoWaitingData.sort((a, b) => (parseInt(a['組序'], 10) || 0) - (parseInt(b['組序'], 10) || 0));

      renderVideoSection();
      renderWaitingTable();
    }

    function renderVideoSection() {
      const section = document.getElementById('videoSection');
      const container = document.getElementById('videoContainer');
      const toggleBtn = document.getElementById('videoToggleBtn');

      if (allVideoWaitingData.length === 0) {
        section.classList.add('hidden');
        return;
      }
      
      section.classList.remove('hidden');

      let displayCount = isVideoExpanded ? allVideoWaitingData.length : 10;
      let displayData = allVideoWaitingData.slice(0, displayCount);

      container.innerHTML = displayData.map(c => `
        <div class="bg-white border border-slate-200 rounded-md px-3 py-1.5 shadow-sm flex items-center gap-2 fade-in">
          <span class="font-bold text-slate-700 text-sm tracking-widest">${c['姓名']}</span>
        </div>
      `).join('');

      if (allVideoWaitingData.length > 10) {
        toggleBtn.classList.remove('hidden');
        toggleBtn.innerHTML = isVideoExpanded 
          ? `<span>收合顯示</span> <i data-lucide="chevron-up" class="w-3 h-3"></i>` 
          : `<span>展開全部 (${allVideoWaitingData.length})</span> <i data-lucide="chevron-down" class="w-3 h-3"></i>`;
        lucide.createIcons();
      } else {
        toggleBtn.classList.add('hidden');
      }
    }

    function renderWaitingTable() {
      let listToRender = currentFilter === 'ALL' 
        ? allProcessedData 
        : allProcessedData.filter(c => String(c['組別']) === currentFilter);

      // 判斷是否只顯示「等待叫號名單」(preparing)
      const isShowAll = showAllCheckbox.checked;
      if (!isShowAll) {
        listToRender = listToRender.filter(c => c.boardStatus === 'preparing');
      }

      if (listToRender.length === 0) {
        let emptyMsg = isShowAll ? '此條件下無考生資料' : '目前暫無需要前往會議廳等待的考生';
        waitingListTable.innerHTML = `<tr class="flex lg:table-row"><td colspan="3" class="py-12 text-center text-slate-400 font-bold text-base w-full">${emptyMsg}</td></tr>`;
        return;
      }

      // 將原本的 py-4 調整為 py-2.5 以便塞入10筆資料，並隱藏組序欄位
      waitingListTable.innerHTML = listToRender.map(c => {
        let statusBadge = '';
        let rowClass = 'flex flex-col lg:table-row bg-white lg:bg-transparent border border-slate-100 lg:border-none lg:border-b lg:border-slate-100 transition-colors text-sm lg:text-base fade-in rounded-xl lg:rounded-none shadow-sm lg:shadow-none p-3 lg:p-0 relative ';
        let nameClass = 'font-black text-slate-800 text-base lg:text-lg tracking-widest';

        switch (c.boardStatus) {
          case 'preparing':
            if (c.isMissedTurn) {
              statusBadge = `<span class="inline-flex justify-center w-full lg:w-auto items-center gap-1 bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md pulse-red tracking-wide"><i data-lucide="alert-circle" class="w-4 h-4"></i> 過號：請至國際會議廳等候</span>`;
              rowClass += 'bg-red-50/60 lg:bg-red-50/80 border-l-4 border-l-red-500 hover:bg-red-100/50 my-1 lg:my-0 z-10';
            } else {
              statusBadge = `<span class="inline-flex justify-center w-full lg:w-auto items-center gap-1 bg-accent text-primary px-4 py-2 rounded-lg font-bold text-sm shadow-md pulse-bg tracking-wide"><i data-lucide="arrow-right-circle" class="w-4 h-4"></i> 請至國際會議廳等待叫號</span>`;
              rowClass += 'bg-highlight/40 lg:bg-highlight/60 border-l-4 border-l-accent hover:bg-highlight/80 my-1 lg:my-0 z-10';
            }
            nameClass = 'font-black text-primary text-lg lg:text-xl tracking-widest';
            break;
            
          case 'waiting':
            statusBadge = `<span class="inline-flex justify-center w-full lg:w-auto items-center gap-1 bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full font-bold text-xs lg:text-sm border border-emerald-200"><i data-lucide="user-check" class="w-3.5 h-3.5"></i> 等候中</span>`;
            rowClass += 'hover:bg-slate-50';
            break;
            
          case 'completed':
            statusBadge = `<span class="inline-flex justify-center w-full lg:w-auto items-center gap-1 bg-slate-100 text-slate-400 px-3 py-1 rounded-full font-bold text-xs lg:text-sm"><i data-lucide="check" class="w-3.5 h-3.5"></i> 已完成</span>`;
            rowClass += 'opacity-50 lg:grayscale hover:bg-slate-50'; 
            break;
            
          case 'not_arrived':
            statusBadge = `<span class="inline-flex justify-center w-full lg:w-auto items-center gap-1 text-slate-400 px-3 py-1 text-xs lg:text-sm font-medium">尚未報到</span>`;
            rowClass += 'text-slate-400 hover:bg-slate-50';
            break;
        }

        return `
          <tr class="${rowClass}">
            <td class="flex justify-between items-center lg:table-cell py-1.5 lg:py-2.5 px-3 lg:px-6 font-bold text-slate-600 border-b border-slate-50 lg:border-none">
              <span class="lg:hidden text-xs text-slate-400 font-normal">組別</span>
              第 ${c['組別']} 組
            </td>
            <td class="flex justify-between items-center lg:table-cell py-1.5 lg:py-2.5 px-3 lg:px-6 border-b border-slate-50 lg:border-none">
              <span class="lg:hidden text-xs text-slate-400 font-normal">姓名</span>
              <span class="${nameClass}">${c['姓名']}</span>
            </td>
            <td class="flex justify-center lg:table-cell py-2 lg:py-2.5 px-3 lg:px-6 text-center mt-1 lg:mt-0 lg:w-1/3">
              ${statusBadge}
            </td>
          </tr>
        `;
      }).join('');
      lucide.createIcons();
    }
  </script>
</body>
</html>
