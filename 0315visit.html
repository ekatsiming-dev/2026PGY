<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>甄選進度即時看板</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#003566',
            accent: '#fca311',
            highlight: '#fef9c3',
            base: '#f8fafc'
          },
          fontFamily: {
            sans: ['Inter', 'Noto Sans TC', 'sans-serif']
          }
        }
      }
    }
  </script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { background-color: #f8fafc; overflow-x: hidden; }
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .pulse-bg { animation: pulseBg 2s infinite; }
    @keyframes pulseBg { 0% { box-shadow: 0 0 0 0 rgba(252, 163, 17, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(252, 163, 17, 0); } 100% { box-shadow: 0 0 0 0 rgba(252, 163, 17, 0); } }
    
    /* 隱藏捲軸但保留捲動功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="font-sans text-slate-800 h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-primary text-white py-5 px-8 shadow-lg flex justify-between items-center z-10 shrink-0">
    <div class="flex items-center gap-4">
      <i data-lucide="monitor-play" class="w-8 h-8 text-accent"></i>
      <div>
        <h1 class="text-3xl font-black tracking-widest text-white">甄選面談進度叫號看板</h1>
        <p class="text-highlight text-sm mt-1 tracking-wider opacity-90">INTERVIEW PROGRESS BOARD</p>
      </div>
    </div>
    <div class="flex items-center gap-6">
      <!-- 時段切換 (供工作人員手動切換看板顯示時段) -->
      <div class="bg-white/10 p-1 rounded-lg flex gap-1">
        <button onclick="setSession('上午')" id="btnMorning" class="px-6 py-2 rounded-md font-bold text-sm transition-colors bg-accent text-primary">上午場</button>
        <button onclick="setSession('下午')" id="btnAfternoon" class="px-6 py-2 rounded-md font-bold text-sm transition-colors text-white hover:bg-white/20">下午場</button>
      </div>
      <div class="text-right flex flex-col items-end">
        <div id="currentTime" class="text-2xl font-bold font-mono text-highlight">00:00:00</div>
        <div class="text-xs text-slate-300 flex items-center gap-1 mt-1">
          <i data-lucide="refresh-cw" class="w-3 h-3 animate-spin"></i> 系統每 15 秒自動更新
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 flex flex-col lg:flex-row gap-6 p-6 overflow-hidden max-w-[1920px] mx-auto w-full">
    
    <!-- 左側：準備區 (前三順位) -->
    <div class="w-full lg:w-5/12 flex flex-col gap-4 h-full">
      <div class="bg-accent rounded-t-2xl py-3 px-6 shadow-md flex items-center gap-3 shrink-0">
        <i data-lucide="bell-ring" class="w-6 h-6 text-primary"></i>
        <h2 class="text-2xl font-black text-primary tracking-wide">即將面談 (準備區)</h2>
      </div>
      
      <div id="preparingList" class="flex-1 flex flex-col gap-4 overflow-y-auto no-scrollbar pb-4">
        <!-- 載入中畫面 -->
        <div class="h-full flex flex-col items-center justify-center text-slate-400">
          <i data-lucide="loader-2" class="w-12 h-12 animate-spin mb-4 text-accent"></i>
          <p class="text-xl font-bold">載入即時進度中...</p>
        </div>
      </div>
    </div>

    <!-- 右側：報到名單進度 -->
    <div class="w-full lg:w-7/12 flex flex-col h-full bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden">
      <div class="bg-slate-100 py-4 px-8 border-b border-slate-200 flex justify-between items-center shrink-0">
        <h2 class="text-xl font-bold text-primary flex items-center gap-2">
          <i data-lucide="users" class="w-5 h-5"></i> 現場候位名單
        </h2>
        <div class="flex gap-4 text-sm font-medium">
          <span class="flex items-center gap-1 text-slate-500"><span class="w-3 h-3 rounded-full bg-slate-200"></span> 尚未報到</span>
          <span class="flex items-center gap-1 text-emerald-600"><span class="w-3 h-3 rounded-full bg-emerald-100 border border-emerald-400"></span> 已報到等待中</span>
          <span class="flex items-center gap-1 text-slate-300"><span class="w-3 h-3 rounded-full bg-slate-50 border border-slate-200"></span> 面談完成</span>
        </div>
      </div>
      
      <div class="flex-1 overflow-y-auto p-2 no-scrollbar">
        <table class="w-full text-left border-collapse">
          <thead class="sticky top-0 bg-white/95 backdrop-blur-sm z-10 shadow-sm">
            <tr class="text-slate-500 text-sm">
              <th class="py-3 px-6 font-bold w-24">組別</th>
              <th class="py-3 px-6 font-bold w-24">編號</th>
              <th class="py-3 px-6 font-bold">姓名</th>
              <th class="py-3 px-6 font-bold text-center">當前狀態</th>
            </tr>
          </thead>
          <tbody id="waitingListTable">
            <!-- 由 JS 動態生成 -->
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script>
    // --- 參數設定 ---
    const API_URL = 'https://script.google.com/macros/s/AKfycbzKLj8037In2HuIuOLHwlB_p6UgFAf3dIWcegnZWKAHsME5iYpdSNxzxgPFw85q5oK2aA/exec';
    let currentSession = new Date().getHours() < 12 ? '上午' : '下午'; // 依據時間自動判斷預設場次
    let lastDataStr = '';

    // --- DOM 綁定 ---
    const preparingList = document.getElementById('preparingList');
    const waitingListTable = document.getElementById('waitingListTable');
    const timeDisplay = document.getElementById('currentTime');
    const btnMorning = document.getElementById('btnMorning');
    const btnAfternoon = document.getElementById('btnAfternoon');

    // --- 初始化 ---
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      updateClock();
      setInterval(updateClock, 1000);
      
      // 設定預設按鈕狀態
      updateSessionButtons();
      
      // 首次抓取資料，並設定每 15 秒抓一次
      fetchData();
      setInterval(fetchData, 15000);
    });

    // --- 輔助函數 ---
    function updateClock() {
      const now = new Date();
      timeDisplay.textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
    }

    function setSession(session) {
      currentSession = session;
      updateSessionButtons();
      // 切換時段時立刻重新抓取並渲染
      lastDataStr = ''; 
      fetchData();
    }

    function updateSessionButtons() {
      if (currentSession === '上午') {
        btnMorning.className = 'px-6 py-2 rounded-md font-bold text-sm transition-colors bg-accent text-primary shadow-sm';
        btnAfternoon.className = 'px-6 py-2 rounded-md font-bold text-sm transition-colors text-white hover:bg-white/20';
      } else {
        btnAfternoon.className = 'px-6 py-2 rounded-md font-bold text-sm transition-colors bg-accent text-primary shadow-sm';
        btnMorning.className = 'px-6 py-2 rounded-md font-bold text-sm transition-colors text-white hover:bg-white/20';
      }
    }

    // 姓名遮蔽處理 (例如：陳怡蓁 -> 陳○蓁, 王大 -> 王○)
    function maskName(name) {
      if (!name) return '未知';
      const str = String(name).trim();
      if (str.length <= 1) return str;
      if (str.length === 2) return str[0] + '○';
      return str[0] + '○' + str.substring(2);
    }

    // --- 核心邏輯 ---
    async function fetchData() {
      try {
        const response = await fetch(API_URL);
        const result = await response.json();
        
        if (result.status === 'success') {
          // 只在資料有變動時重新渲染，避免畫面一直閃爍
          const newDataStr = JSON.stringify(result.data);
          if (newDataStr !== lastDataStr) {
            processAndRender(result.data);
            lastDataStr = newDataStr;
          }
        }
      } catch (error) {
        console.error('抓取資料失敗:', error);
        // 若失敗，保持原畫面，不顯示錯誤嚇到考生
      }
    }

    function processAndRender(data) {
      // 1. 篩選出當前場次的資料
      let sessionData = data.filter(c => c['時段'] === currentSession);

      // 2. 排序：先依「組別」，再依「NO/ID」排序
      sessionData.sort((a, b) => {
        let gA = parseInt(a['組別']) || 0;
        let gB = parseInt(b['組別']) || 0;
        if (gA !== gB) return gA - gB;
        
        let nA = parseInt(a['NO'] || a['ID']) || 0;
        let nB = parseInt(b['NO'] || b['ID']) || 0;
        return nA - nB;
      });

      // 3. 邏輯判斷：尋找前 3 位「已報到」但「未面談」的考生
      let preparingCount = 0;
      sessionData = sessionData.map(c => {
        let status = 'not_arrived'; // 尚未報到
        let orderInQueue = -1;

        if (c.status_interview) {
          status = 'completed'; // 面談完成
        } else if (c.status_checkin) {
          if (preparingCount < 3) {
            status = 'preparing'; // 準備中 (前三順位)
            orderInQueue = preparingCount + 1;
            preparingCount++;
          } else {
            status = 'waiting'; // 已報到，等待中 (三位之後)
          }
        }
        return { ...c, boardStatus: status, orderInQueue };
      });

      // 4. 渲染畫面
      renderPreparingList(sessionData.filter(c => c.boardStatus === 'preparing'));
      renderWaitingTable(sessionData);
    }

    // 渲染左側準備區
    function renderPreparingList(preparingData) {
      if (preparingData.length === 0) {
        preparingList.innerHTML = `
          <div class="h-full flex flex-col items-center justify-center text-slate-300 bg-white rounded-2xl border-2 border-dashed border-slate-200">
            <i data-lucide="coffee" class="w-16 h-16 mb-4 opacity-50"></i>
            <p class="text-2xl font-bold">目前無等候中名單</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      preparingList.innerHTML = preparingData.map((c, index) => `
        <div class="bg-highlight border-2 border-accent rounded-2xl p-6 shadow-lg pulse-bg fade-in relative overflow-hidden flex flex-col justify-center">
          <div class="absolute top-0 right-0 bg-accent text-primary font-black text-xl px-5 py-2 rounded-bl-2xl">
            順位 ${index + 1}
          </div>
          <div class="flex items-end gap-4 mb-4 mt-2">
            <div class="text-6xl font-black text-primary tracking-wider">${c['NO'] || c['ID']}</div>
            <div class="text-2xl font-bold text-slate-600 mb-1">第 ${c['組別']} 組</div>
          </div>
          <div class="text-4xl font-black text-slate-800 mb-6 tracking-widest">${maskName(c['姓名'])}</div>
          
          <div class="bg-primary text-white rounded-xl p-4 flex items-center justify-center gap-3 shadow-inner">
            <i data-lucide="arrow-right-circle" class="w-8 h-8 text-accent animate-bounce"></i>
            <span class="text-2xl font-bold tracking-wider">請到國際會議廳等待叫號</span>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    // 渲染右側名單清單
    function renderWaitingTable(allSessionData) {
      if (allSessionData.length === 0) {
        waitingListTable.innerHTML = `<tr><td colspan="4" class="py-12 text-center text-slate-400 font-bold text-lg">此時段無考生資料</td></tr>`;
        return;
      }

      waitingListTable.innerHTML = allSessionData.map(c => {
        let statusBadge = '';
        let rowClass = 'border-b border-slate-100 hover:bg-slate-50 transition-colors text-lg fade-in ';

        switch (c.boardStatus) {
          case 'preparing':
            statusBadge = `<span class="inline-flex justify-center w-full items-center gap-1.5 bg-accent/20 text-amber-700 px-4 py-1.5 rounded-full font-bold text-sm border border-accent/30"><i data-lucide="megaphone" class="w-4 h-4"></i> 準備叫號</span>`;
            rowClass += 'bg-highlight/30';
            break;
          case 'waiting':
            statusBadge = `<span class="inline-flex justify-center w-full items-center gap-1.5 bg-emerald-50 text-emerald-700 px-4 py-1.5 rounded-full font-bold text-sm border border-emerald-200"><i data-lucide="user-check" class="w-4 h-4"></i> 等候中</span>`;
            break;
          case 'completed':
            statusBadge = `<span class="inline-flex justify-center w-full items-center gap-1.5 bg-slate-100 text-slate-400 px-4 py-1.5 rounded-full font-bold text-sm"><i data-lucide="check" class="w-4 h-4"></i> 已完成</span>`;
            rowClass += 'opacity-50 grayscale'; // 已完成的人淡化處理
            break;
          case 'not_arrived':
            statusBadge = `<span class="inline-flex justify-center w-full items-center gap-1.5 text-slate-400 px-4 py-1.5 text-sm font-medium">尚未報到</span>`;
            rowClass += 'text-slate-400';
            break;
        }

        return `
          <tr class="${rowClass}">
            <td class="py-4 px-6 font-bold text-slate-600">第 ${c['組別']} 組</td>
            <td class="py-4 px-6 font-black text-primary">${c['NO'] || c['ID']}</td>
            <td class="py-4 px-6 font-bold tracking-widest">${maskName(c['姓名'])}</td>
            <td class="py-4 px-6 text-center">${statusBadge}</td>
          </tr>
        `;
      }).join('');
      lucide.createIcons();
    }
  </script>
</body>
</html>
