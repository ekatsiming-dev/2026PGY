<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>甄選報到與面談追蹤系統</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#003566',
            accent: '#fca311',
            highlight: '#fef9c3',
            base: '#f8fafc'
          },
          fontFamily: {
            sans: ['Inter', 'Noto Sans TC', 'sans-serif']
          }
        }
      }
    }
  </script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { background-color: #f8fafc; scroll-behavior: smooth; }
    /* 載入動畫 */
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #003566;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    
    /* 隱藏捲軸但保留捲動功能 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 隱藏展開式搜尋框的 placeholder 直到 hover/focus */
    .search-expand::placeholder {
      color: transparent;
      transition: color 0.2s ease;
    }
    .search-expand:focus::placeholder, .search-expand:hover::placeholder {
      color: #94a3b8; /* text-slate-400 */
    }
  </style>
</head>
<body class="font-sans text-slate-800 pb-12">

  <!-- Header -->
  <header class="bg-primary text-white py-5 px-6 md:px-8 shadow-md sticky top-0 z-20 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div>
      <h1 class="text-xl md:text-2xl font-bold tracking-wide flex flex-wrap items-center gap-2 md:gap-3">
        甄選報到與面談追蹤系統
        <span id="syncStatus" class="inline-flex items-center gap-1 text-xs bg-emerald-500/20 text-emerald-300 px-2 py-1 rounded-full border border-emerald-500/30 whitespace-nowrap">
          <i data-lucide="wifi" class="w-3 h-3"></i> 已連線
        </span>
      </h1>
      <p class="text-highlight text-xs md:text-sm mt-1 opacity-90">工作人員專用</p>
    </div>
    <div class="flex flex-wrap gap-2 w-full md:w-auto">
      <button onclick="fetchData()" class="flex-1 md:flex-none flex justify-center items-center gap-2 bg-white/10 hover:bg-white/20 transition-colors px-5 py-2 rounded-lg text-sm font-medium">
        <i data-lucide="refresh-cw" class="w-4 h-4"></i> 重新整理
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 md:px-6 mt-6 md:mt-8 space-y-6 md:space-y-8">
    
    <!-- 讀取中遮罩 -->
    <div id="loadingOverlay" class="hidden bg-white/80 backdrop-blur-sm border border-slate-100 rounded-2xl p-8 text-center shadow-sm z-30 relative">
      <div class="loader mx-auto mb-4 border-t-accent"></div>
      <p class="text-slate-500 font-medium text-sm md:text-base">正在與 Google Sheets 同步資料...</p>
    </div>

    <!-- 1. 時段篩選區 (置頂) -->
    <div class="flex justify-center">
      <div class="inline-flex bg-white p-1.5 rounded-xl shadow-sm border border-slate-100 w-full sm:w-auto" id="filterContainer">
        <button data-session="全部" class="filter-btn px-6 py-2 rounded-lg text-sm font-medium transition-all flex-1 sm:flex-none bg-primary text-white shadow-sm">全部時段</button>
        <button data-session="上午" class="filter-btn px-6 py-2 rounded-lg text-sm font-medium transition-all flex-1 sm:flex-none text-slate-600 hover:bg-slate-50">上午場</button>
        <button data-session="下午" class="filter-btn px-6 py-2 rounded-lg text-sm font-medium transition-all flex-1 sm:flex-none text-slate-600 hover:bg-slate-50">下午場</button>
      </div>
    </div>

    <!-- 2. 對應的大盤進度儀表板 (會隨時段篩選連動) -->
    <div id="dashboardContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 transition-all">
      <!-- 由 JS 動態生成 -->
    </div>

    <!-- 3. 各組賸餘面談監測儀表板 (支援收合展開) -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden fade-in">
      <button id="toggleGroupDashboard" class="w-full flex items-center justify-between p-4 md:p-5 bg-white hover:bg-slate-50 transition-colors focus:outline-none">
        <div class="flex items-center gap-2">
          <i data-lucide="activity" class="text-accent w-5 h-5"></i>
          <h2 class="text-lg font-bold text-slate-800">各組賸餘面談數監測</h2>
          <span class="text-xs font-normal text-slate-400 ml-1 md:ml-2 bg-slate-100 px-2 py-1 rounded-md hidden sm:inline-block">分母為已報到者</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs text-slate-400 hidden sm:inline-block" id="groupDashboardStatusText">點擊展開詳細進度</span>
          <i data-lucide="chevron-down" id="groupDashboardChevron" class="w-5 h-5 text-slate-400 transition-transform duration-300"></i>
        </div>
      </button>
      
      <!-- 展開的內容區 (預設隱藏) -->
      <div id="groupDashboardContent" class="hidden border-t border-slate-100 bg-slate-50/50">
        <div id="groupDashboardContainer" class="p-4 md:p-5 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3 md:gap-4 transition-all">
          <!-- 由 JS 動態生成 -->
        </div>
      </div>
    </div>

    <!-- 4. 詳細篩選控制列 (搜尋、組別、尾數按鈕) -->
    <div class="flex flex-col lg:flex-row justify-between items-center gap-4 bg-white p-4 md:p-5 rounded-xl shadow-sm border border-slate-100">
      
      <!-- 左側：圖示化搜尋與組別 -->
      <div class="flex items-center gap-3 w-full lg:w-auto">
        <!-- 展開式模糊搜尋 -->
        <div class="relative group z-10">
          <input type="text" id="searchInput" class="search-expand w-10 h-10 pl-10 pr-4 rounded-full border border-slate-200 focus:w-48 sm:focus:w-64 hover:w-48 sm:hover:w-64 transition-all duration-300 ease-in-out outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 bg-slate-50 cursor-pointer focus:cursor-text text-sm" placeholder="搜尋姓名、編號...">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 w-4 h-4 pointer-events-none group-hover:text-primary transition-colors"></i>
        </div>

        <div class="h-6 w-px bg-slate-200 mx-1 hidden sm:block"></div>

        <!-- 組別下拉選單 -->
        <div class="relative flex-1 sm:w-36">
          <select id="groupFilter" class="w-full appearance-none pl-4 pr-9 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-slate-50 text-slate-700 text-sm font-medium cursor-pointer h-10">
            <option value="全部">全部組別</option>
          </select>
          <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4 pointer-events-none"></i>
        </div>
      </div>

      <!-- 右側：按鍵式尾數篩選 -->
      <div class="flex items-center w-full lg:w-auto overflow-hidden">
        <span class="text-xs font-bold text-slate-400 mr-3 shrink-0 uppercase tracking-wider hidden sm:block">尾數篩選</span>
        <i data-lucide="hash" class="text-slate-400 w-4 h-4 mr-2 sm:hidden shrink-0"></i>
        <div class="flex items-center gap-1.5 overflow-x-auto no-scrollbar pb-1 w-full" id="idSuffixButtons">
          <button data-val="" class="id-btn active shrink-0 px-3 h-9 rounded-md text-sm font-medium bg-slate-800 text-white shadow-sm transition-all">全</button>
          <!-- 0-9 按鈕由 JS 生成 -->
        </div>
      </div>

    </div>

    <!-- 5. 名單表格 -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden relative">
      <div class="md:hidden absolute top-0 right-0 bg-gradient-to-l from-white via-white/80 to-transparent w-12 h-full pointer-events-none z-10 flex items-center justify-end pr-2">
        <i data-lucide="chevron-right" class="text-slate-300 w-5 h-5 animate-pulse"></i>
      </div>
      
      <div class="overflow-x-auto no-scrollbar pb-2">
        <table class="w-full text-left border-collapse min-w-[700px]">
          <thead>
            <tr class="bg-base border-b border-slate-200 text-sm text-slate-500">
              <th class="py-3 px-3 md:px-4 font-semibold w-24 md:w-28 whitespace-nowrap">組別/序</th>
              <th class="py-3 px-3 md:px-4 font-semibold w-24 md:w-32 whitespace-nowrap">姓名</th>
              <th class="py-3 px-2 md:px-3 font-semibold text-center w-28 md:w-32 whitespace-nowrap">報到狀態</th>
              <th class="py-3 px-2 md:px-3 font-semibold text-center w-28 md:w-32 whitespace-nowrap">叫號準備</th>
              <th class="py-3 px-2 md:px-3 font-semibold text-center w-28 md:w-32 whitespace-nowrap">面談狀態</th>
              <th class="py-3 px-2 font-semibold text-center w-16 whitespace-nowrap">管理</th>
              <th class="w-full"></th> 
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="7" class="py-12 text-center text-slate-400">
                <i data-lucide="inbox" class="mx-auto mb-3 opacity-50 w-8 h-8"></i>
                請先確認連線狀態或重新整理
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- 回到最上面按鈕 -->
  <button id="backToTopBtn" class="fixed bottom-6 right-6 z-40 bg-accent text-primary p-3 rounded-full shadow-lg opacity-0 translate-y-10 pointer-events-none transition-all duration-300 hover:bg-amber-400 hover:shadow-xl focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent" aria-label="回到最上面">
    <i data-lucide="arrow-up" class="w-6 h-6"></i>
  </button>

  <!-- 自訂 Toast 提示框容器 -->
  <div id="toastContainer" class="fixed bottom-20 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script>
    // --- 應用程式狀態 ---
    let candidates = [];
    let filterSession = '全部'; // 全部, 上午, 下午
    let filterIdSuffix = ''; // 空字串代表全部，否則為 '0'-'9'
    
    // API 網址直接寫死
    const API_URL = 'https://script.google.com/macros/s/AKfycbzKLj8037In2HuIuOLHwlB_p6UgFAf3dIWcegnZWKAHsME5iYpdSNxzxgPFw85q5oK2aA/exec';

    // --- DOM 元素綁定 ---
    const syncStatus = document.getElementById('syncStatus');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const dashboardContainer = document.getElementById('dashboardContainer');
    
    // 各組進度面板元素
    const toggleGroupDashboardBtn = document.getElementById('toggleGroupDashboard');
    const groupDashboardContent = document.getElementById('groupDashboardContent');
    const groupDashboardContainer = document.getElementById('groupDashboardContainer');
    const groupDashboardChevron = document.getElementById('groupDashboardChevron');
    const groupDashboardStatusText = document.getElementById('groupDashboardStatusText');
    
    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    const groupFilter = document.getElementById('groupFilter');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const idSuffixContainer = document.getElementById('idSuffixButtons');
    const backToTopBtn = document.getElementById('backToTopBtn'); 

    // --- 初始化 ---
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      generateIdButtons();
      fetchData();
      
      // 綁定搜尋與組別事件
      searchInput.addEventListener('input', renderTable);
      groupFilter.addEventListener('change', renderTable);

      // 綁定各組儀表板收合/展開事件
      if (toggleGroupDashboardBtn) {
        toggleGroupDashboardBtn.addEventListener('click', () => {
          const isHidden = groupDashboardContent.classList.contains('hidden');
          if (isHidden) {
            // 展開
            groupDashboardContent.classList.remove('hidden');
            groupDashboardChevron.classList.add('rotate-180');
            if(groupDashboardStatusText) groupDashboardStatusText.textContent = '點擊收合詳細進度';
          } else {
            // 收合
            groupDashboardContent.classList.add('hidden');
            groupDashboardChevron.classList.remove('rotate-180');
            if(groupDashboardStatusText) groupDashboardStatusText.textContent = '點擊展開詳細進度';
          }
        });
      }

      // 綁定大時段篩選事件
      filterBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          filterSession = e.target.dataset.session;
          
          filterBtns.forEach(b => {
            b.classList.remove('bg-primary', 'text-white', 'shadow-sm');
            b.classList.add('text-slate-600', 'hover:bg-slate-50');
          });
          e.target.classList.remove('text-slate-600', 'hover:bg-slate-50');
          e.target.classList.add('bg-primary', 'text-white', 'shadow-sm');
          
          renderDashboard();
          renderTable();
        });
      });

      // --- 回到最上面按鈕邏輯 ---
      window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
          backToTopBtn.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
          backToTopBtn.classList.add('opacity-100', 'translate-y-0', 'pointer-events-auto');
        } else {
          backToTopBtn.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
          backToTopBtn.classList.remove('opacity-100', 'translate-y-0', 'pointer-events-auto');
        }
      });

      backToTopBtn.addEventListener('click', () => {
        window.scrollTo({
          top: 0,
          behavior: 'smooth'
        });
      });
    });

    // 生成 0-9 尾數按鈕
    function generateIdButtons() {
      for (let i = 0; i <= 9; i++) {
        const btn = document.createElement('button');
        btn.className = 'id-btn shrink-0 w-9 h-9 rounded-md text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 border border-slate-200/50 transition-all';
        btn.dataset.val = i;
        btn.textContent = i;
        idSuffixContainer.appendChild(btn);
      }

      const idBtns = document.querySelectorAll('.id-btn');
      idBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          filterIdSuffix = e.target.dataset.val;
          
          idBtns.forEach(b => {
            b.classList.remove('bg-slate-800', 'text-white', 'shadow-sm', 'border-transparent');
            b.classList.add('bg-slate-100', 'text-slate-600', 'hover:bg-slate-200');
          });
          e.target.classList.remove('bg-slate-100', 'text-slate-600', 'hover:bg-slate-200');
          e.target.classList.add('bg-slate-800', 'text-white', 'shadow-sm', 'border-transparent');
          
          renderTable();
        });
      });
    }

    // --- 自訂提示框 ---
    function showToast(message, type = 'error') {
      const toast = document.createElement('div');
      let bgColor = 'bg-slate-800';
      let iconName = 'info';
      if (type === 'error') {
        bgColor = 'bg-red-600';
        iconName = 'alert-triangle';
      } else if (type === 'success') {
        bgColor = 'bg-emerald-600';
        iconName = 'check-circle';
      }

      toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 text-sm font-medium fade-in pointer-events-auto`;
      toast.innerHTML = `
        <i data-lucide="${iconName}" class="w-4 h-4"></i>
        ${message}
      `;
      document.getElementById('toastContainer').appendChild(toast);
      lucide.createIcons();
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(10px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    function extractName(c) {
      if (c['姓名']) return c['姓名'];
      if (c['名字']) return c['名字'];
      if (c['Name']) return c['Name'];
      const fuzzyKey = Object.keys(c).find(k => k.includes('姓名') || k.includes('名字') || k.toLowerCase().includes('name'));
      return fuzzyKey ? c[fuzzyKey] : '未知';
    }

    function formatTime(timeStr) {
      if (!timeStr) return '';
      try {
        const date = new Date(timeStr);
        if (isNaN(date.getTime())) return timeStr;
        return date.toLocaleTimeString('zh-TW', {
          timeZone: 'Asia/Taipei',
          hour12: false,
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
      } catch (e) {
        return timeStr;
      }
    }

    function updateSyncStatus(isSyncing, isError = false) {
      if (isError) {
        syncStatus.className = 'inline-flex items-center gap-1 text-xs bg-red-500/20 text-red-600 px-2 py-1 rounded-full border border-red-500/30 whitespace-nowrap';
        syncStatus.innerHTML = '<i data-lucide="wifi-off" class="w-3 h-3"></i> 連線失敗';
      } else if (isSyncing) {
        syncStatus.className = 'inline-flex items-center gap-1 text-xs bg-accent/20 text-amber-700 px-2 py-1 rounded-full border border-accent/30 whitespace-nowrap';
        syncStatus.innerHTML = '<div class="loader w-3 h-3 border-t-amber-700"></div> 正在同步';
      } else {
        syncStatus.className = 'inline-flex items-center gap-1 text-xs bg-emerald-500/20 text-emerald-700 px-2 py-1 rounded-full border border-emerald-500/30 whitespace-nowrap';
        syncStatus.innerHTML = '<i data-lucide="wifi" class="w-3 h-3"></i> 已連線';
      }
      lucide.createIcons();
    }

    async function fetchData() {
      loadingOverlay.classList.remove('hidden');
      updateSyncStatus(true);

      try {
        const response = await fetch(API_URL);
        const result = await response.json();
        
        if (result.status === 'success') {
          let groupCounters = {};
          candidates = result.data.map(c => {
            const group = c['組別'] || '未分組';
            if (!groupCounters[group]) groupCounters[group] = 1;
            else groupCounters[group]++;
            return { ...c, _groupOrder: groupCounters[group] }; 
          });

          updateGroupDropdown(); 
          renderDashboard();
          renderTable();
          updateSyncStatus(false);
        } else {
          throw new Error(result.message);
        }
      } catch (error) {
        console.error('Fetch error:', error);
        updateSyncStatus(false, true);
        tableBody.innerHTML = `<tr><td colspan="7" class="py-12 text-center text-red-500">無法讀取資料，請確認您的 Google Sheet 權限設定。<br><span class="text-xs opacity-70">${error.message}</span></td></tr>`;
      } finally {
        loadingOverlay.classList.add('hidden');
      }
    }

    async function handleAction(rowIndex, type, isUndo = false) {
      const now = new Date();
      const timeString = now.toLocaleString('zh-TW', { 
        timeZone: 'Asia/Taipei',
        month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false 
      });
      
      const targetIndex = candidates.findIndex(c => c._rowIndex === rowIndex);
      if (targetIndex === -1) return;

      const originalData = JSON.parse(JSON.stringify(candidates[targetIndex]));
      
      if (type === 'checkin') {
        candidates[targetIndex].status_checkin = !isUndo;
        candidates[targetIndex].time_checkin = isUndo ? '' : timeString;
        if (isUndo) { 
          candidates[targetIndex].status_call = false;
          candidates[targetIndex].time_call = '';
          candidates[targetIndex].status_interview = false;
          candidates[targetIndex].time_interview = '';
        }
      } else if (type === 'call') {
        candidates[targetIndex].status_call = !isUndo;
        candidates[targetIndex].time_call = isUndo ? '' : timeString;
        if (isUndo) {
          candidates[targetIndex].status_interview = false;
          candidates[targetIndex].time_interview = '';
        }
      } else if (type === 'interview') {
        candidates[targetIndex].status_interview = !isUndo;
        candidates[targetIndex].time_interview = isUndo ? '' : timeString;
      }

      renderDashboard();
      renderTable();
      updateSyncStatus(true);

      try {
        const payloads = [{ rowIndex, type, isUndo, timeString }];
        
        if (type === 'checkin' && isUndo) {
          payloads.push({ rowIndex, type: 'call', isUndo: true, timeString: '' });
          payloads.push({ rowIndex, type: 'interview', isUndo: true, timeString: '' });
        } else if (type === 'call' && isUndo) {
          payloads.push({ rowIndex, type: 'interview', isUndo: true, timeString: '' });
        }

        for (const p of payloads) {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(p)
          });
          
          const result = await response.json();
          if (result.status !== 'success') throw new Error(result.message);
        }
        
        updateSyncStatus(false);
      } catch (error) {
        console.error('Update error:', error);
        showToast('雲端更新失敗，資料將恢復原狀。請檢查網路連線。');
        candidates[targetIndex] = originalData;
        renderDashboard();
        renderTable();
        updateSyncStatus(false, true);
      }
    }

    async function handleReset(rowIndex) {
      const targetIndex = candidates.findIndex(c => c._rowIndex === rowIndex);
      if (targetIndex === -1) return;

      const candidate = candidates[targetIndex];
      // 防呆：如果原本就沒有任何狀態，不執行動作
      if (!candidate.status_checkin && !candidate.status_call && !candidate.status_interview) return;

      const originalData = JSON.parse(JSON.stringify(candidate));

      // 本地狀態先行歸零
      candidate.status_checkin = false;
      candidate.time_checkin = '';
      candidate.status_call = false;
      candidate.time_call = '';
      candidate.status_interview = false;
      candidate.time_interview = '';

      renderDashboard();
      renderTable();
      updateSyncStatus(true);
      showToast(`已清空 ${extractName(candidate)} 的所有狀態`, 'success');

      try {
        const payloads = [
          { rowIndex, type: 'checkin', isUndo: true, timeString: '' },
          { rowIndex, type: 'call', isUndo: true, timeString: '' },
          { rowIndex, type: 'interview', isUndo: true, timeString: '' }
        ];

        for (const p of payloads) {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(p)
          });
          
          const result = await response.json();
          if (result.status !== 'success') throw new Error(result.message);
        }
        
        updateSyncStatus(false);
      } catch (error) {
        console.error('Reset error:', error);
        showToast('雲端重置失敗，資料將恢復原狀。請檢查網路連線。', 'error');
        // 恢復原本狀態
        candidates[targetIndex] = originalData;
        renderDashboard();
        renderTable();
        updateSyncStatus(false, true);
      }
    }

    function updateGroupDropdown() {
      const currentVal = groupFilter.value;
      const groups = [...new Set(candidates.map(c => String(c['組別'])).filter(g => g && g !== 'undefined'))]
                     .sort((a, b) => parseInt(a) - parseInt(b) || 0);

      groupFilter.innerHTML = '<option value="全部">全部組別</option>' + 
                              groups.map(g => `<option value="${g}">第 ${g} 組</option>`).join('');
      
      if (groups.includes(currentVal)) {
        groupFilter.value = currentVal;
      }
    }

    // 主儀表板渲染
    function renderDashboard() {
      const calcStats = (sessionStr) => {
        const sessionData = candidates.filter(c => c['時段'] === sessionStr);
        const validData = sessionData.filter(c => c['出席'] !== '否' && c['出席'] !== '未');
        
        const total = validData.length;
        const checkedIn = validData.filter(c => c.status_checkin).length;
        const interviewed = validData.filter(c => c.status_interview).length;
        
        const attendanceRate = total === 0 ? 0 : Math.round((checkedIn / total) * 100);
        const interviewRate = checkedIn === 0 ? 0 : Math.round((interviewed / checkedIn) * 100);
        
        return { total, checkedIn, interviewed, attendanceRate, interviewRate };
      };

      const stats = { 上午: calcStats('上午'), 下午: calcStats('下午') };
      
      const sessionsToShow = filterSession === '全部' ? ['上午', '下午'] : [filterSession];
      
      dashboardContainer.className = sessionsToShow.length === 1 
        ? 'grid grid-cols-1 gap-4 md:gap-6 max-w-2xl mx-auto transition-all fade-in' 
        : 'grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 transition-all fade-in';

      dashboardContainer.innerHTML = sessionsToShow.map(session => `
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 md:p-6 flex flex-col relative overflow-hidden">
          <div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
          <h2 class="text-lg md:text-xl font-bold text-primary mb-4 flex items-center gap-2">
            <i data-lucide="${session === '上午' ? 'sunrise' : 'sunset'}" class="text-accent w-5 h-5"></i> ${session}場即時狀態
          </h2>
          
          <div class="grid grid-cols-2 gap-3 md:gap-4 mb-4">
            <div class="bg-slate-50 rounded-xl p-3 md:p-4 border border-slate-100">
              <p class="text-slate-500 text-[10px] md:text-xs font-semibold mb-1">出席進度 (已報到/應出席)</p>
              <p class="text-xl md:text-2xl font-bold text-slate-800">
                ${stats[session].checkedIn} <span class="text-xs md:text-sm text-slate-400 font-normal">/ ${stats[session].total}</span>
              </p>
            </div>
            <div class="bg-slate-50 rounded-xl p-3 md:p-4 border border-slate-100">
              <p class="text-slate-500 text-[10px] md:text-xs font-semibold mb-1">面談進度 (完成/已報到)</p>
              <p class="text-xl md:text-2xl font-bold text-slate-800">
                ${stats[session].interviewed} <span class="text-xs md:text-sm text-slate-400 font-normal">/ ${stats[session].checkedIn}</span>
              </p>
            </div>
          </div>

          <div class="space-y-3 md:space-y-4">
            <div>
              <div class="flex justify-between text-xs md:text-sm mb-1">
                <span class="font-medium text-slate-600">出席率 <span class="text-[10px] text-slate-400 font-normal">(排除不出席)</span></span>
                <span class="font-bold text-primary">${stats[session].attendanceRate}%</span>
              </div>
              <div class="w-full bg-slate-100 rounded-full h-1.5 md:h-2">
                <div class="bg-primary h-1.5 md:h-2 rounded-full transition-all duration-500" style="width: ${stats[session].attendanceRate}%"></div>
              </div>
            </div>
            <div>
              <div class="flex justify-between text-xs md:text-sm mb-1">
                <span class="font-medium text-slate-600">面談完成率</span>
                <span class="font-bold text-accent">${stats[session].interviewRate}%</span>
              </div>
              <div class="w-full bg-slate-100 rounded-full h-1.5 md:h-2">
                <div class="bg-accent h-1.5 md:h-2 rounded-full transition-all duration-500" style="width: ${stats[session].interviewRate}%"></div>
              </div>
            </div>
          </div>
        </div>
      `).join('');
      
      // 同步更新子儀表板 (各組進度)
      renderGroupDashboard();
      lucide.createIcons();
    }

    // 新增：各組賸餘面談數儀表板渲染
    function renderGroupDashboard() {
      if (!groupDashboardContainer) return;

      // 1. 過濾出當前時段的有效名單 (排除明確不出席或未確認者)
      const validCandidates = candidates.filter(c => {
        const matchSession = filterSession === '全部' || c['時段'] === filterSession;
        const validAttendance = c['出席'] !== '否' && c['出席'] !== '未';
        return matchSession && validAttendance;
      });

      // 2. 統計各組數據 (以已報到者為分母)
      const groupData = {};
      validCandidates.forEach(c => {
        const group = String(c['組別'] || '未分組');
        if (!groupData[group]) {
          groupData[group] = { totalValid: 0, checkedIn: 0, interviewed: 0 };
        }
        groupData[group].totalValid++;
        if (c.status_checkin) {
          groupData[group].checkedIn++;
          if (c.status_interview) {
            groupData[group].interviewed++;
          }
        }
      });

      // 3. 排序組別 (數字遞增)
      const sortedGroups = Object.keys(groupData).sort((a, b) => {
        if (a === '未分組') return 1;
        if (b === '未分組') return -1;
        return parseInt(a) - parseInt(b) || 0;
      });

      // 4. 產生 UI
      if (sortedGroups.length === 0) {
        groupDashboardContainer.innerHTML = '<div class="col-span-full text-slate-400 text-sm py-4 text-center">目前無進行中的組別資料</div>';
        return;
      }

      groupDashboardContainer.innerHTML = sortedGroups.map(group => {
        const stats = groupData[group];
        // 賸餘人數 = 已報到 - 已面談
        const remaining = stats.checkedIn - stats.interviewed;
        // 進度條百分比 (已面談 / 已報到)
        const progressPercent = stats.checkedIn === 0 ? 0 : Math.round((stats.interviewed / stats.checkedIn) * 100);

        // 視覺顏色判定 (導入 PDCA 改善視覺警示)
        let statusColor = 'text-slate-500';
        let bgColor = 'bg-slate-100';
        let barColor = 'bg-slate-300';
        let statusText = '尚未報到';

        if (stats.checkedIn > 0) {
          if (remaining === 0) {
            statusColor = 'text-emerald-700'; // 完成
            bgColor = 'bg-emerald-100';
            barColor = 'bg-emerald-500';
            statusText = '已清空';
          } else {
            statusColor = 'text-amber-700'; // 進行中/待消化
            bgColor = 'bg-accent/20';
            barColor = 'bg-accent';
            statusText = '待消化';
          }
        }

        return `
          <div class="bg-slate-50 rounded-xl border border-slate-100 p-3 md:p-4 flex flex-col justify-between hover:shadow-md transition-all hover:border-slate-200">
            <div class="flex justify-between items-center mb-3">
              <span class="font-bold text-slate-700 text-sm">第 ${group} 組</span>
              <span class="text-[10px] md:text-[11px] font-bold px-2 py-0.5 rounded-full ${bgColor} ${statusColor}">
                ${statusText}
              </span>
            </div>
            <div class="flex items-end gap-1.5 mb-3">
              <div class="text-2xl md:text-3xl font-bold leading-none ${remaining > 0 ? 'text-primary' : 'text-slate-400'}">
                ${remaining}
              </div>
              <div class="text-[10px] md:text-xs text-slate-500 mb-0.5">
                人等待 / 共 ${stats.checkedIn} 人報到
              </div>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-1.5 mt-auto overflow-hidden">
              <div class="${barColor} h-1.5 rounded-full transition-all duration-500" style="width: ${progressPercent}%"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderTable() {
      const keyword = searchInput.value.toLowerCase().trim();
      const groupVal = groupFilter.value;

      const filtered = candidates.filter(c => {
        const matchSession = filterSession === '全部' || c['時段'] === filterSession;
        const matchGroup = groupVal === '全部' || String(c['組別']) === groupVal;
        
        let matchSuffix = true;
        if (filterIdSuffix !== '') {
          const sid = String(c['身分證字號'] || '');
          const idStr = String(c['ID'] || '');
          matchSuffix = sid.endsWith(filterIdSuffix) || idStr.endsWith(filterIdSuffix);
        }

        const displayName = extractName(c);
        const searchStr = `${displayName} ${c['ID'] || ''} ${c['NO'] || ''} ${c['組序'] || c._groupOrder || ''}`.toLowerCase();
        const matchKeyword = searchStr.includes(keyword);

        return matchSession && matchGroup && matchSuffix && matchKeyword;
      });

      if (filtered.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="7" class="py-12 text-center text-slate-400">
              <i data-lucide="alert-circle" class="mx-auto mb-3 opacity-50 w-8 h-8"></i>
              沒有符合條件的資料
            </td>
          </tr>`;
        lucide.createIcons();
        return;
      }

      tableBody.innerHTML = filtered.map(c => {
        
        const displayName = extractName(c);
        let actionCellsHTML = '';
        
        // 判斷是否完全沒有狀態（用於重置按鈕的防呆）
        const hasNoStatus = !c.status_checkin && !c.status_call && !c.status_interview;
        
        if (c['出席'] === '否') {
          actionCellsHTML = `
            <td colspan="5" class="py-3 px-3 md:px-4">
              <div class="bg-red-50 text-red-600 border border-red-100 rounded-lg px-4 py-2 w-full md:max-w-xs flex items-center justify-center gap-2">
                <i data-lucide="x-circle" class="w-4 h-4"></i>
                <span class="font-bold text-sm">已回覆無法出席</span>
              </div>
            </td>`;
        } else if (c['出席'] === '未') {
          actionCellsHTML = `
            <td colspan="5" class="py-3 px-3 md:px-4">
              <div class="bg-amber-50 text-amber-700 border border-amber-100 rounded-lg px-4 py-2 w-full md:max-w-sm flex items-center gap-2">
                <i data-lucide="alert-triangle" class="w-4 h-4 flex-shrink-0"></i>
                <span class="font-bold text-sm">未回覆是否通過一階國考 <span class="text-xs opacity-80 font-normal">(需確認)</span></span>
              </div>
            </td>`;
        } else {
          actionCellsHTML = `
            <!-- 報到狀態 -->
            <td class="py-3 px-2 md:px-3 text-center">
              ${c.status_checkin ? `
                <div class="flex flex-col items-center">
                  <span class="inline-flex items-center gap-1 text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full text-[11px] md:text-sm font-semibold mb-1 border border-emerald-100 whitespace-nowrap">
                    <i data-lucide="check-circle-2" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> 已報到
                  </span>
                  <span class="text-[10px] md:text-xs text-slate-400 font-mono tracking-tighter">${formatTime(c.time_checkin)}</span>
                  <button onclick="handleAction(${c._rowIndex}, 'checkin', true)" class="text-[10px] text-slate-400 hover:text-red-500 mt-1 underline transition-colors">取消報到</button>
                </div>
              ` : `
                <button onclick="handleAction(${c._rowIndex}, 'checkin', false)" class="inline-flex items-center justify-center gap-1.5 bg-primary hover:bg-blue-900 text-white px-3 py-1.5 md:py-2 rounded-lg text-[11px] md:text-sm font-medium transition-transform active:scale-95 shadow-sm w-full min-w-[104px] max-w-[120px] mx-auto whitespace-nowrap">
                  <i data-lucide="user-check" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> 辦理報到
                </button>
              `}
            </td>

            <!-- 叫號準備 -->
            <td class="py-3 px-2 md:px-3 text-center">
              ${c.status_call ? `
                <div class="flex flex-col items-center">
                  <span class="inline-flex items-center gap-1 text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full text-[11px] md:text-sm font-semibold mb-1 border border-indigo-100 whitespace-nowrap">
                    <i data-lucide="bell-ring" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> 已通知
                  </span>
                  <span class="text-[10px] md:text-xs text-slate-400 font-mono tracking-tighter">${formatTime(c.time_call)}</span>
                  <button onclick="handleAction(${c._rowIndex}, 'call', true)" class="text-[10px] text-slate-400 hover:text-red-500 mt-1 underline transition-colors">取消叫號</button>
                </div>
              ` : `
                <button onclick="handleAction(${c._rowIndex}, 'call', false)" 
                  ${!c.status_checkin ? 'disabled' : ''}
                  class="inline-flex items-center justify-center gap-1.5 px-3 py-1.5 md:py-2 rounded-lg text-[11px] md:text-sm font-medium transition-all active:scale-95 shadow-sm w-full min-w-[104px] max-w-[120px] mx-auto whitespace-nowrap ${
                    c.status_checkin 
                      ? 'bg-indigo-500 hover:bg-indigo-600 text-white' 
                      : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                  }"
                >
                  <i data-lucide="mic" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> 
                  ${c.status_checkin ? '準備叫號' : '等待報到'}
                </button>
              `}
            </td>
            
            <!-- 面談狀態 -->
            <td class="py-3 px-2 md:px-3 text-center">
              ${c.status_interview ? `
                <div class="flex flex-col items-center">
                  <span class="inline-flex items-center gap-1 text-primary bg-accent/20 px-2.5 py-1 rounded-full text-[11px] md:text-sm font-semibold mb-1 border border-accent/30 whitespace-nowrap">
                    <i data-lucide="check-circle-2" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> 面談完成
                  </span>
                  <span class="text-[10px] md:text-xs text-slate-400 font-mono tracking-tighter">${formatTime(c.time_interview)}</span>
                  <button onclick="handleAction(${c._rowIndex}, 'interview', true)" class="text-[10px] text-slate-400 hover:text-red-500 mt-1 underline transition-colors">取消面談</button>
                </div>
              ` : `
                <button onclick="handleAction(${c._rowIndex}, 'interview', false)" 
                  ${!c.status_call ? 'disabled' : ''}
                  class="inline-flex items-center justify-center gap-1.5 px-3 py-1.5 md:py-2 rounded-lg text-[11px] md:text-sm font-medium transition-all active:scale-95 shadow-sm w-full min-w-[104px] max-w-[120px] mx-auto whitespace-nowrap ${
                    c.status_call 
                      ? 'bg-accent hover:bg-amber-500 text-primary' 
                      : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                  }"
                >
                  <i data-lucide="message-square" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> 
                  ${c.status_call ? '完成面談' : (c.status_checkin ? '等待叫號' : '等待報到')}
                </button>
              `}
            </td>
            
            <!-- 管理操作區：清空狀態按鈕 -->
            <td class="py-3 px-2 text-center">
              <button onclick="handleReset(${c._rowIndex})" 
                class="inline-flex items-center justify-center p-2 rounded-full text-slate-400 transition-colors ${
                  hasNoStatus ? 'opacity-30 cursor-not-allowed pointer-events-none' : 'hover:bg-red-50 hover:text-red-500'
                }"
                title="清空所有狀態">
                <i data-lucide="rotate-ccw" class="w-4 h-4 md:w-5 md:h-5"></i>
              </button>
            </td>
            <td class="w-full"></td> <!-- 補齊佔位用的空欄位 -->
          `;
        }

        return `
        <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors ${c.status_interview ? 'bg-highlight/30' : ''} fade-in">
          
          <td class="py-3 px-3 md:px-4">
            <div class="flex flex-col whitespace-nowrap">
              <span class="text-[11px] md:text-xs font-bold text-slate-400 mb-0.5">第 ${c['組別'] || '-'} 組</span>
              <span class="font-bold text-slate-800 text-sm md:text-base">組序 <span class="text-primary text-lg md:text-xl">${c['組序'] || c._groupOrder || '-'}</span></span>
            </div>
            <div class="text-[10px] md:text-[11px] text-slate-500 mt-1">${c['時段'] || ''}</div>
          </td>

          <td class="py-3 px-3 md:px-4">
            <div class="font-bold text-primary text-sm md:text-lg whitespace-nowrap">${displayName}</div>
          </td>
          
          ${actionCellsHTML}

        </tr>
      `}).join('');
      
      lucide.createIcons();
    }
  </script>
</body>
</html>
