<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>甄選報到與面談追蹤系統 (雲端版)</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#003566',
            accent: '#fca311',
            highlight: '#fef9c3',
            base: '#f8fafc'
          },
          fontFamily: {
            sans: ['Inter', 'Noto Sans TC', 'sans-serif']
          }
        }
      }
    }
  </script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { background-color: #f8fafc; scroll-behavior: smooth; }
    /* 載入動畫 */
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #003566;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="font-sans text-slate-800 pb-12">

  <!-- API URL 設定彈窗 -->
  <div id="setupModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full mx-4 fade-in border-t-4 border-primary">
      <h2 class="text-2xl font-bold text-primary mb-2 flex items-center gap-2">
        <i data-lucide="link"></i> 系統連線設定
      </h2>
      <p class="text-sm text-slate-500 mb-6">目前已自動綁定您的專屬資料庫。若未來有更換，請在此更新 Google Apps Script 網頁應用程式網址。</p>
      <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/AKfycbzKLj8037In2HuIuOLHwlB_p6UgFAf3dIWcegnZWKAHsME5iYpdSNxzxgPFw85q5oK2aA/exec" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all mb-4 bg-slate-50">
      <div class="flex justify-end gap-3">
        <button onclick="closeSetupModal()" class="px-6 py-2 rounded-lg font-medium text-slate-500 hover:bg-slate-100 transition-colors">取消</button>
        <button id="saveApiBtn" class="bg-primary hover:bg-blue-900 text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-sm">
          儲存並連線
        </button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header class="bg-primary text-white py-6 px-8 shadow-md sticky top-0 z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div>
      <h1 class="text-2xl font-bold tracking-wide flex items-center gap-3">
        甄選報到與面談追蹤系統
        <span id="syncStatus" class="inline-flex items-center gap-1 text-xs bg-emerald-500/20 text-emerald-300 px-2 py-1 rounded-full border border-emerald-500/30">
          <i data-lucide="wifi" class="w-3 h-3"></i> 已連線
        </span>
      </h1>
      <p class="text-highlight text-sm mt-1 opacity-90">實時雲端監控板 Cloud Dashboard</p>
    </div>
    <div class="flex gap-4">
      <button onclick="fetchData()" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 transition-colors px-4 py-2 rounded-lg text-sm font-medium">
        <i data-lucide="refresh-cw" class="w-4 h-4"></i> 重新整理
      </button>
      <button onclick="openSetupModal()" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 transition-colors px-4 py-2 rounded-lg text-sm font-medium" title="更換資料庫網址">
        <i data-lucide="settings" class="w-4 h-4"></i> 設定
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 mt-8 space-y-8">
    
    <!-- 讀取中遮罩 -->
    <div id="loadingOverlay" class="hidden bg-white/80 backdrop-blur-sm border border-slate-100 rounded-2xl p-8 text-center shadow-sm">
      <div class="loader mx-auto mb-4 border-t-accent"></div>
      <p class="text-slate-500 font-medium">正在與 Google Sheets 同步資料...</p>
    </div>

    <!-- 戰情面板 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="dashboardContainer">
      <!-- 由 JS 動態生成 -->
    </div>

    <!-- 控制列 -->
    <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
      <div class="flex gap-2 w-full md:w-auto" id="filterContainer">
        <button data-session="全部" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors flex-1 md:flex-none bg-primary text-white">全部</button>
        <button data-session="上午" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors flex-1 md:flex-none bg-slate-100 text-slate-600 hover:bg-slate-200">上午</button>
        <button data-session="下午" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors flex-1 md:flex-none bg-slate-100 text-slate-600 hover:bg-slate-200">下午</button>
      </div>
      <div class="relative w-full md:w-72">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
        <input type="text" id="searchInput" placeholder="搜尋姓名、ID 或編號..." class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-slate-50">
      </div>
    </div>

    <!-- 名單表格 -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-base border-b border-slate-200 text-sm text-slate-500">
              <th class="py-4 px-6 font-semibold min-w-[120px]">編號/時段</th>
              <th class="py-4 px-6 font-semibold min-w-[200px]">姓名/學校</th>
              <th class="py-4 px-6 font-semibold text-center min-w-[150px]">報到狀態</th>
              <th class="py-4 px-6 font-semibold text-center min-w-[150px]">面談狀態</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="4" class="py-12 text-center text-slate-400">
                <i data-lucide="inbox" class="mx-auto mb-3 opacity-50 w-8 h-8"></i>
                請先確認連線狀態或重新整理
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    // --- 應用程式狀態 ---
    let candidates = [];
    let filterSession = '全部';
    let searchTerm = '';
    
    // 將您提供的專屬 URL 直接設定為預設值
    const DEFAULT_API_URL = 'https://script.google.com/macros/s/AKfycbzKLj8037In2HuIuOLHwlB_p6UgFAf3dIWcegnZWKAHsME5iYpdSNxzxgPFw85q5oK2aA/exec';
    const STORAGE_KEY = 'gas_api_url';

    // --- DOM 元素綁定 ---
    const setupModal = document.getElementById('setupModal');
    const apiUrlInput = document.getElementById('apiUrlInput');
    const saveApiBtn = document.getElementById('saveApiBtn');
    const syncStatus = document.getElementById('syncStatus');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const dashboardContainer = document.getElementById('dashboardContainer');
    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    const filterBtns = document.querySelectorAll('.filter-btn');

    // --- 初始化 ---
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      checkSetup();
      
      // 事件綁定
      saveApiBtn.addEventListener('click', saveApiUrl);
      searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value.toLowerCase();
        renderTable();
      });
      filterBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          filterSession = e.target.dataset.session;
          // 更新按鈕樣式
          filterBtns.forEach(b => {
            b.classList.remove('bg-primary', 'text-white');
            b.classList.add('bg-slate-100', 'text-slate-600');
          });
          e.target.classList.remove('bg-slate-100', 'text-slate-600');
          e.target.classList.add('bg-primary', 'text-white');
          renderTable();
        });
      });
    });

    // --- 設定與連線管理 ---
    function checkSetup() {
      // 檢查本地是否有儲存的網址，如果沒有，就自動寫入預設網址
      let url = localStorage.getItem(STORAGE_KEY);
      if (!url) {
        url = DEFAULT_API_URL;
        localStorage.setItem(STORAGE_KEY, url);
      }
      apiUrlInput.value = url;
      
      // 直接執行連線，不彈出設定視窗
      fetchData();
    }

    function openSetupModal() {
      setupModal.classList.remove('hidden');
    }

    function closeSetupModal() {
      setupModal.classList.add('hidden');
    }

    function saveApiUrl() {
      const url = apiUrlInput.value.trim();
      if (!url.startsWith('https://script.google.com/')) {
        alert('請輸入有效的 Google Apps Script 網址');
        return;
      }
      localStorage.setItem(STORAGE_KEY, url);
      closeSetupModal();
      fetchData();
    }

    function updateSyncStatus(isSyncing, isError = false) {
      if (isError) {
        syncStatus.className = 'inline-flex items-center gap-1 text-xs bg-red-500/20 text-red-600 px-2 py-1 rounded-full border border-red-500/30';
        syncStatus.innerHTML = '<i data-lucide="wifi-off" class="w-3 h-3"></i> 連線失敗';
      } else if (isSyncing) {
        syncStatus.className = 'inline-flex items-center gap-1 text-xs bg-accent/20 text-amber-700 px-2 py-1 rounded-full border border-accent/30';
        syncStatus.innerHTML = '<div class="loader w-3 h-3 border-t-amber-700"></div> 正在同步';
      } else {
        syncStatus.className = 'inline-flex items-center gap-1 text-xs bg-emerald-500/20 text-emerald-700 px-2 py-1 rounded-full border border-emerald-500/30';
        syncStatus.innerHTML = '<i data-lucide="wifi" class="w-3 h-3"></i> 已連線';
      }
      lucide.createIcons();
    }

    // --- API 通訊 ---
    async function fetchData() {
      const url = localStorage.getItem(STORAGE_KEY);
      if (!url) return;

      loadingOverlay.classList.remove('hidden');
      updateSyncStatus(true);

      try {
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.status === 'success') {
          candidates = result.data;
          renderDashboard();
          renderTable();
          updateSyncStatus(false);
        } else {
          throw new Error(result.message);
        }
      } catch (error) {
        console.error('Fetch error:', error);
        updateSyncStatus(false, true);
        tableBody.innerHTML = `<tr><td colspan="4" class="py-12 text-center text-red-500">無法讀取資料，請檢查網址或您的試算表權限設定（需設為所有人可存取）。<br><span class="text-xs opacity-70">${error.message}</span></td></tr>`;
      } finally {
        loadingOverlay.classList.add('hidden');
      }
    }

    async function handleAction(rowIndex, type, isUndo = false) {
      const url = localStorage.getItem(STORAGE_KEY);
      if (!url) return;

      const now = new Date();
      const timeString = now.toLocaleTimeString('zh-TW', { hour12: false });
      
      // 樂觀更新 (Optimistic UI Update) - 先在本地改變畫面，讓使用者感覺瞬間完成
      const targetIndex = candidates.findIndex(c => c._rowIndex === rowIndex);
      if (targetIndex === -1) return;

      const originalData = JSON.parse(JSON.stringify(candidates[targetIndex])); // 備份以防失敗
      
      if (type === 'checkin') {
        candidates[targetIndex].status_checkin = !isUndo;
        candidates[targetIndex].time_checkin = isUndo ? '' : timeString;
        if (isUndo) {
          candidates[targetIndex].status_interview = false;
          candidates[targetIndex].time_interview = '';
        }
      } else if (type === 'interview') {
        candidates[targetIndex].status_interview = !isUndo;
        candidates[targetIndex].time_interview = isUndo ? '' : timeString;
      }

      renderDashboard();
      renderTable();
      updateSyncStatus(true);

      // 發送至後端
      try {
        const payload = { rowIndex, type, isUndo, timeString };
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 避開預檢請求
          body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        if (result.status !== 'success') throw new Error(result.message);
        
        updateSyncStatus(false);
      } catch (error) {
        console.error('Update error:', error);
        alert('雲端更新失敗，資料將恢復原狀。請檢查網路連線。');
        candidates[targetIndex] = originalData; // 發生錯誤時還原
        renderDashboard();
        renderTable();
        updateSyncStatus(false, true);
      }
    }

    // --- 畫面渲染 ---
    function renderDashboard() {
      const calcStats = (sessionStr) => {
        const sessionData = candidates.filter(c => c['時段'] === sessionStr);
        const total = sessionData.length;
        const checkedIn = sessionData.filter(c => c.status_checkin).length;
        const interviewed = sessionData.filter(c => c.status_interview).length;
        
        const attendanceRate = total === 0 ? 0 : Math.round((checkedIn / total) * 100);
        const interviewRate = checkedIn === 0 ? 0 : Math.round((interviewed / checkedIn) * 100);
        
        return { total, checkedIn, interviewed, attendanceRate, interviewRate };
      };

      const stats = { 上午: calcStats('上午'), 下午: calcStats('下午') };
      
      dashboardContainer.innerHTML = ['上午', '下午'].map(session => `
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col relative overflow-hidden fade-in">
          <div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
          <h2 class="text-xl font-bold text-primary mb-4 flex items-center gap-2">
            <i data-lucide="clock" class="text-accent w-5 h-5"></i> ${session}場即時戰況
          </h2>
          
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="bg-slate-50 rounded-xl p-4">
              <p class="text-slate-500 text-xs font-semibold mb-1">出席進度 (已報到/總數)</p>
              <p class="text-2xl font-bold text-slate-800">
                ${stats[session].checkedIn} <span class="text-sm text-slate-400 font-normal">/ ${stats[session].total}</span>
              </p>
            </div>
            <div class="bg-slate-50 rounded-xl p-4">
              <p class="text-slate-500 text-xs font-semibold mb-1">面談進度 (完成/已報到)</p>
              <p class="text-2xl font-bold text-slate-800">
                ${stats[session].interviewed} <span class="text-sm text-slate-400 font-normal">/ ${stats[session].checkedIn}</span>
              </p>
            </div>
          </div>

          <div class="space-y-4">
            <div>
              <div class="flex justify-between text-sm mb-1">
                <span class="font-medium text-slate-600">出席率</span>
                <span class="font-bold text-primary">${stats[session].attendanceRate}%</span>
              </div>
              <div class="w-full bg-slate-100 rounded-full h-2">
                <div class="bg-primary h-2 rounded-full transition-all duration-500" style="width: ${stats[session].attendanceRate}%"></div>
              </div>
            </div>
            <div>
              <div class="flex justify-between text-sm mb-1">
                <span class="font-medium text-slate-600">面談完成率 <span class="text-xs text-slate-400 font-normal">(以報到人數為基準)</span></span>
                <span class="font-bold text-accent">${stats[session].interviewRate}%</span>
              </div>
              <div class="w-full bg-slate-100 rounded-full h-2">
                <div class="bg-accent h-2 rounded-full transition-all duration-500" style="width: ${stats[session].interviewRate}%"></div>
              </div>
            </div>
          </div>
        </div>
      `).join('');
      
      lucide.createIcons();
    }

    function renderTable() {
      const filtered = candidates.filter(c => {
        const matchSession = filterSession === '全部' || c['時段'] === filterSession;
        const searchStr = `${c['姓名'] || ''} ${c['ID'] || ''} ${c['NO'] || ''}`.toLowerCase();
        const matchSearch = searchStr.includes(searchTerm);
        return matchSession && matchSearch;
      });

      if (filtered.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="4" class="py-12 text-center text-slate-400">
              <i data-lucide="alert-circle" class="mx-auto mb-3 opacity-50 w-8 h-8"></i>
              沒有符合條件的資料
            </td>
          </tr>`;
        lucide.createIcons();
        return;
      }

      tableBody.innerHTML = filtered.map(c => `
        <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors ${c.status_interview ? 'bg-highlight/30' : ''} fade-in">
          <td class="py-4 px-6">
            <div class="font-bold text-slate-800">${c['NO'] || c['ID'] || '-'}</div>
            <div class="text-xs text-slate-500 mt-1">${c['時段'] || ''} • 第${c['組別'] || '-'}組</div>
          </td>
          <td class="py-4 px-6">
            <div class="font-bold text-primary text-lg">${c['姓名'] || '未知'}</div>
            <div class="text-xs text-slate-500 mt-1">${c['畢業學校'] || ''}</div>
          </td>
          <td class="py-4 px-6 text-center">
            ${c.status_checkin ? `
              <div class="flex flex-col items-center">
                <span class="inline-flex items-center gap-1 text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full text-sm font-semibold mb-1 border border-emerald-100">
                  <i data-lucide="check-circle-2" class="w-4 h-4"></i> 已報到
                </span>
                <span class="text-xs text-slate-400 font-mono">${c.time_checkin}</span>
                <button onclick="handleAction(${c._rowIndex}, 'checkin', true)" class="text-[10px] text-slate-400 hover:text-red-500 mt-1 underline transition-colors">取消報到</button>
              </div>
            ` : `
              <button onclick="handleAction(${c._rowIndex}, 'checkin', false)" class="inline-flex items-center justify-center gap-2 bg-primary hover:bg-blue-900 text-white px-5 py-2 rounded-lg font-medium transition-transform active:scale-95 shadow-sm w-full max-w-[120px]">
                <i data-lucide="user-check" class="w-4 h-4"></i> 報到
              </button>
            `}
          </td>
          <td class="py-4 px-6 text-center">
            ${c.status_interview ? `
              <div class="flex flex-col items-center">
                <span class="inline-flex items-center gap-1 text-primary bg-accent/20 px-3 py-1 rounded-full text-sm font-semibold mb-1 border border-accent/30">
                  <i data-lucide="check-circle-2" class="w-4 h-4"></i> 面談完成
                </span>
                <span class="text-xs text-slate-400 font-mono">${c.time_interview}</span>
                <button onclick="handleAction(${c._rowIndex}, 'interview', true)" class="text-[10px] text-slate-400 hover:text-red-500 mt-1 underline transition-colors">取消面談</button>
              </div>
            ` : `
              <button onclick="handleAction(${c._rowIndex}, 'interview', false)" 
                ${!c.status_checkin ? 'disabled' : ''}
                class="inline-flex items-center justify-center gap-2 px-5 py-2 rounded-lg font-medium transition-all active:scale-95 shadow-sm w-full max-w-[120px] ${
                  c.status_checkin 
                    ? 'bg-accent hover:bg-amber-500 text-primary' 
                    : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                }"
              >
                <i data-lucide="message-square" class="w-4 h-4"></i> 
                ${c.status_checkin ? '完成面談' : '等待報到'}
              </button>
            `}
          </td>
        </tr>
      `).join('');
      
      lucide.createIcons();
    }
  </script>
</body>
</html>
